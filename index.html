<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#bfe6f5">
<title>Poppu Blow</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    width: 100%; height: 100%; overflow: hidden;
    background: #bfe6f5;
    font-family: 'Trebuchet MS', 'Segoe UI', system-ui, sans-serif;
    touch-action: none; user-select: none; -webkit-user-select: none;
    overscroll-behavior: none;
  }
  #game { display: block; width: 100vw; height: 100vh; touch-action: none; }
  #start {
    position: fixed; inset: 0; z-index: 10;
    background: transparent;
    transition: opacity .5s ease; cursor: pointer;
  }
  #start.hide { opacity: 0; pointer-events: none; }
  /* Start screen is fully rendered on the canvas; this overlay only catches taps */
  #start h1, #start .sub, #start .play { display: none; }
  #hint {
    position: fixed; left: 50%; bottom: 26px; transform: translateX(-50%); z-index: 5;
    color: #6b5a8a; font-size: clamp(13px, 4vw, 18px); font-weight: bold;
    background: rgba(255,255,255,.55); padding: 9px 20px; border-radius: 40px;
    pointer-events: none; opacity: 0; transition: opacity .5s; backdrop-filter: blur(3px);
  }
  #hint.show { opacity: 1; }
</style>
</head>
<body>
<canvas id="game"></canvas>
<div id="hint">✋ Drag to make wind!</div>
<div id="start">
  <h1>Poppu&nbsp;Blow</h1>
  <div class="sub">🦊 Drag to blow things away!</div>
  <div class="play">▶ Play</div>
</div>

<script>
"use strict";
(function () {
/* ============================================================================
   POPPU BLOW — a toddler wind game
   Single file, vanilla JS, Canvas 2D, Web Audio. No dependencies.
   ========================================================================== */

const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

let W = 0, H = 0, DPR = 1;
function resize() {
  DPR = Math.min(window.devicePixelRatio || 1, 2.5);
  W = window.innerWidth; H = window.innerHeight;
  canvas.width = Math.floor(W * DPR);
  canvas.height = Math.floor(H * DPR);
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
}
window.addEventListener('resize', resize);
resize();

/* ---- helpers ---------------------------------------------------------- */
const TAU = Math.PI * 2;
const rand = (a, b) => a + Math.random() * (b - a);
const randi = (a, b) => Math.floor(rand(a, b + 1));
const pick = arr => arr[(Math.random() * arr.length) | 0];
const clamp = (v, a, b) => v < a ? a : v > b ? b : v;
const lerp = (a, b, t) => a + (b - a) * t;
const dist2 = (x1, y1, x2, y2) => { const dx = x2 - x1, dy = y2 - y1; return dx * dx + dy * dy; };
function roundRect(c, x, y, w, h, r) {
  c.beginPath();
  c.moveTo(x + r, y);
  c.arcTo(x + w, y, x + w, y + h, r);
  c.arcTo(x + w, y + h, x, y + h, r);
  c.arcTo(x, y + h, x, y, r);
  c.arcTo(x, y, x + w, y, r);
  c.closePath();
}

/* ============================================================================
   PRODUCTION ART ASSETS — real illustrated PNGs (gpt_image_2), clean alpha.
   Objects, Poppu, and backgrounds are drawn via drawImage() of these assets;
   no procedural shape drawing for them. Physics/audio/wind are untouched.
   ========================================================================== */
const IMG = {};
const IMG_NAMES = [
  'poppu-idle', 'poppu-excited', 'poppu-celebrate',
  'dandelion-full', 'dandelion-seed',
  'butterfly-pink', 'butterfly-yellow', 'butterfly-purple', 'flower-set',
  'balloon-red', 'balloon-blue', 'balloon-yellow', 'balloon-pink',
  'cloud-puffy', 'feather-white', 'bubble',
  'magic-orb-purple', 'magic-orb-cyan', 'magic-orb-gold',
  'bg-meadow', 'bg-sky', 'bg-magic'
];
for (const n of IMG_NAMES) { const im = new Image(); im.src = 'assets/' + n + '.png'; IMG[n] = im; }
function imgReady(name) { const i = IMG[name]; return !!(i && i.complete && i.naturalWidth > 0); }

// Draw a sprite centered on the current transform origin. dispH = display height
// in local px; width follows the source aspect. Optional vertical offset yOff.
function drawImg(name, dispH, yOff) {
  const im = IMG[name];
  if (!im || !im.complete || !im.naturalWidth) return false;
  const w = dispH * (im.naturalWidth / im.naturalHeight);
  ctx.drawImage(im, -w / 2, -dispH / 2 + (yOff || 0), w, dispH);
  return true;
}

// Draw a full-screen background image, scaled to COVER (like background-size: cover).
function drawBGCover(name) {
  const im = IMG[name];
  if (!im || !im.complete || !im.naturalWidth) { ctx.fillStyle = '#bfe6f5'; ctx.fillRect(0, 0, W, H); return false; }
  const ir = im.naturalWidth / im.naturalHeight, sr = W / H;
  let w, h;
  if (sr > ir) { w = W; h = W / ir; } else { h = H; w = H * ir; }
  ctx.drawImage(im, (W - w) / 2, (H - h) / 2, w, h);
  return true;
}

/* ============================================================================
   AUDIO — Web Audio API, all synthesized
   ========================================================================== */
const Audio = (function () {
  let ac = null, master = null, ready = false;
  let windGain = null, windFilter = null, windSrc = null, windLFO = null;
  let noiseBuf = null;

  function init() {
    if (ac) return;
    try {
      ac = new (window.AudioContext || window.webkitAudioContext)();
    } catch (e) { return; }
    master = ac.createGain();
    master.gain.value = 0.85;
    master.connect(ac.destination);

    // pink-ish noise buffer for wind
    const len = ac.sampleRate * 2;
    noiseBuf = ac.createBuffer(1, len, ac.sampleRate);
    const d = noiseBuf.getChannelData(0);
    let b0 = 0, b1 = 0, b2 = 0;
    for (let i = 0; i < len; i++) {
      const white = Math.random() * 2 - 1;
      b0 = 0.99765 * b0 + white * 0.0990460;
      b1 = 0.96300 * b1 + white * 0.2965164;
      b2 = 0.57000 * b2 + white * 1.0526913;
      d[i] = (b0 + b1 + b2 + white * 0.1848) * 0.16;
    }

    // continuous wind bed (gain rides with drag speed)
    windSrc = ac.createBufferSource();
    windSrc.buffer = noiseBuf; windSrc.loop = true;
    windFilter = ac.createBiquadFilter();
    windFilter.type = 'bandpass'; windFilter.frequency.value = 550; windFilter.Q.value = 0.7;
    windGain = ac.createGain(); windGain.gain.value = 0;
    windLFO = ac.createOscillator(); windLFO.type = 'sine'; windLFO.frequency.value = 0.7;
    const lfoGain = ac.createGain(); lfoGain.gain.value = 180;
    windLFO.connect(lfoGain); lfoGain.connect(windFilter.frequency);
    windSrc.connect(windFilter); windFilter.connect(windGain); windGain.connect(master);
    windSrc.start(); windLFO.start();
    ready = true;
  }

  function resume() { if (ac && ac.state === 'suspended') ac.resume(); }

  function setWind(intensity) {
    if (!ready) return;
    const t = ac.currentTime;
    windGain.gain.setTargetAtTime(clamp(intensity, 0, 1) * 0.18, t, 0.08);
    windFilter.frequency.setTargetAtTime(400 + intensity * 900, t, 0.12);
  }

  // simple tone with envelope
  function tone(freq, dur, type, vol, opts) {
    if (!ready) return;
    opts = opts || {};
    const t = ac.currentTime;
    const o = ac.createOscillator();
    const g = ac.createGain();
    o.type = type || 'sine';
    o.frequency.setValueAtTime(freq, t);
    if (opts.glideTo) o.frequency.exponentialRampToValueAtTime(opts.glideTo, t + dur);
    g.gain.setValueAtTime(0.0001, t);
    g.gain.exponentialRampToValueAtTime(vol, t + (opts.attack || 0.01));
    g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
    o.connect(g);
    if (opts.filter) {
      const f = ac.createBiquadFilter();
      f.type = 'lowpass'; f.frequency.value = opts.filter;
      g.connect(f); f.connect(master);
    } else g.connect(master);
    o.start(t); o.stop(t + dur + 0.05);
  }

  // little musical sparkle (rising arpeggio)
  function chime(base, steps, vol) {
    if (!ready) return;
    const notes = steps || [0, 4, 7, 12];
    notes.forEach((s, i) => {
      const f = (base || 523) * Math.pow(2, s / 12);
      setTimeout(() => tone(f, 0.5, 'sine', (vol || 0.15), { attack: 0.02, filter: 3500 }), i * 70);
    });
  }

  // object-specific pops
  const sfx = {
    seed()   { tone(rand(900,1300), 0.18, 'sine', 0.10, { attack: 0.005, glideTo: rand(1500,2200), filter: 4000 }); },
    balloon(){ tone(rand(300,460), 0.22, 'square', 0.12, { attack: 0.005, glideTo: rand(700,950), filter: 1600 }); },
    butterfly(){ Audio.chime(rand(700,900), [0, 5, 9], 0.07); },
    cloud()  { tone(rand(160,230), 0.5, 'sine', 0.09, { attack: 0.06, filter: 900 }); },
    feather(){ tone(rand(1200,1700), 0.3, 'sine', 0.06, { attack: 0.03, glideTo: rand(600,900), filter: 5000 }); },
    bubble() { tone(rand(500,800), 0.14, 'sine', 0.09, { attack: 0.004, glideTo: rand(1100,1700), filter: 4500 }); },
    pop()    { tone(rand(600,900), 0.09, 'sine', 0.11, { attack: 0.003, glideTo: rand(1300,1900), filter: 5000 }); },
    orb()    { Audio.chime(rand(600,760), [0, 4, 7, 11], 0.09); },
    wisp()   { tone(rand(800,1100), 0.4, 'triangle', 0.07, { attack: 0.04, glideTo: rand(1400,1900), filter: 4000 }); },
    giggle() {
      const notes = [0, 3, -2, 5, 2];
      notes.forEach((s, i) => setTimeout(() => tone(660 * Math.pow(2, s/12), 0.16, 'sine', 0.10, { attack: 0.01, filter: 3000 }), i * 90));
    },
    celebrate() {
      Audio.chime(523, [0, 4, 7, 12, 16, 19], 0.16);
      setTimeout(() => Audio.chime(587, [0, 4, 7, 12], 0.13), 300);
    },
    whoosh() { tone(220, 0.4, 'sine', 0.05, { attack: 0.05, glideTo: 90, filter: 700 }); }
  };

  return { init, resume, setWind, tone, chime, sfx };
})();

/* ============================================================================
   POINTER / WIND INPUT
   ========================================================================== */
const pointer = {
  x: 0, y: 0, px: 0, py: 0, vx: 0, vy: 0, speed: 0,
  down: false, active: false, lastT: 0
};

function pointerPos(e) {
  const t = e.touches ? e.touches[0] : e;
  return { x: t.clientX, y: t.clientY };
}
function onDown(e) {
  Audio.init(); Audio.resume();
  const p = pointerPos(e);
  pointer.down = true; pointer.active = true;
  pointer.x = pointer.px = p.x; pointer.y = pointer.py = p.y;
  pointer.vx = pointer.vy = 0; pointer.speed = 0;
  pointer.lastT = performance.now();
  hideHint();
  e.preventDefault();
}
function onMove(e) {
  if (!pointer.down) return;
  const p = pointerPos(e);
  pointer.x = p.x; pointer.y = p.y;
  e.preventDefault();
}
function onUp(e) {
  pointer.down = false;
  if (e) e.preventDefault();
}
canvas.addEventListener('mousedown', onDown);
window.addEventListener('mousemove', onMove);
window.addEventListener('mouseup', onUp);
canvas.addEventListener('touchstart', onDown, { passive: false });
canvas.addEventListener('touchmove', onMove, { passive: false });
window.addEventListener('touchend', onUp, { passive: false });
window.addEventListener('touchcancel', onUp, { passive: false });

// wind trail sampling
const trail = [];
function updatePointer(dt) {
  const now = performance.now();
  if (pointer.down) {
    const ndt = Math.max(0.001, (now - pointer.lastT) / 1000);
    let nvx = (pointer.x - pointer.px) / ndt;
    let nvy = (pointer.y - pointer.py) / ndt;
    // smooth velocity
    pointer.vx = lerp(pointer.vx, nvx, 0.5);
    pointer.vy = lerp(pointer.vy, nvy, 0.5);
    pointer.speed = Math.hypot(pointer.vx, pointer.vy);
    pointer.px = pointer.x; pointer.py = pointer.y; pointer.lastT = now;

    if (pointer.speed > 40) {
      trail.push({ x: pointer.x, y: pointer.y, vx: pointer.vx, vy: pointer.vy,
                   life: 1, r: clamp(pointer.speed / 900, 0.35, 1) });
      spawnWindParticles();
    }
  } else {
    pointer.speed = lerp(pointer.speed, 0, 0.2);
    pointer.vx = lerp(pointer.vx, 0, 0.2);
    pointer.vy = lerp(pointer.vy, 0, 0.2);
  }
  Audio.setWind(clamp(pointer.speed / 1400, 0, 1) * (pointer.down ? 1 : 0.15));

  for (let i = trail.length - 1; i >= 0; i--) {
    trail[i].life -= dt * 1.7;
    if (trail[i].life <= 0) trail.splice(i, 1);
  }
  if (trail.length > 90) trail.splice(0, trail.length - 90);
}

/* ============================================================================
   PARTICLES (generic soft particles + wind wisps)
   ========================================================================== */
const particles = [];
function addParticle(p) { particles.push(p); }

function spawnWindParticles() {
  const n = clamp((pointer.speed / 500) | 0, 1, 3);
  for (let i = 0; i < n; i++) {
    const a = Math.atan2(pointer.vy, pointer.vx) + rand(-0.4, 0.4);
    const sp = pointer.speed * rand(0.15, 0.4);
    addParticle({
      type: 'wind',
      x: pointer.x + rand(-14, 14), y: pointer.y + rand(-14, 14),
      vx: Math.cos(a) * sp, vy: Math.sin(a) * sp,
      life: 1, decay: rand(1.4, 2.4), r: rand(5, 13),
      hue: 190 + rand(-20, 30)
    });
  }
}

function burst(x, y, color, count, opts) {
  opts = opts || {};
  for (let i = 0; i < count; i++) {
    const a = rand(0, TAU);
    const sp = rand(opts.min || 60, opts.max || 260);
    addParticle({
      type: opts.type || 'spark',
      x, y, vx: Math.cos(a) * sp, vy: Math.sin(a) * sp - (opts.up || 0),
      life: 1, decay: rand(0.8, 1.7), r: rand(opts.rMin || 3, opts.rMax || 8),
      color: color, grav: opts.grav != null ? opts.grav : 40,
      spin: rand(-8, 8), rot: rand(0, TAU),
      twinkle: opts.twinkle
    });
  }
}

function updateParticles(dt) {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.life -= dt * p.decay;
    if (p.life <= 0) { particles.splice(i, 1); continue; }
    p.x += p.vx * dt; p.y += p.vy * dt;
    if (p.grav) p.vy += p.grav * dt;
    const dr = p.airDrag != null ? p.airDrag : 0.98;
    p.vx *= dr; p.vy *= dr;
    if (p.spin) p.rot += p.spin * dt;
    if (p.sway) p.x += Math.sin((p.rot || 0) + p.life * 6) * p.sway * dt;
  }
  if (particles.length > 600) particles.splice(0, particles.length - 600);
}

function drawParticles() {
  for (const p of particles) {
    const a = clamp(p.life, 0, 1);
    if (p.type === 'wind') {
      ctx.globalAlpha = a * 0.5;
      ctx.fillStyle = `hsl(${p.hue}, 80%, 88%)`;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r * (0.5 + a * 0.7), 0, TAU);
      ctx.fill();
    } else if (p.type === 'confetti') {
      ctx.save();
      ctx.globalAlpha = a;
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rot);
      ctx.fillStyle = p.color;
      const w = p.r * 1.6, h = p.r * 2.4 * (0.5 + 0.5 * Math.abs(Math.cos(p.rot * 1.3)));
      roundRect(ctx, -w / 2, -h / 2, w, h, 2);
      ctx.fill();
      ctx.restore();
    } else if (p.type === 'star' || p.twinkle) {
      ctx.save();
      ctx.globalAlpha = a;
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rot);
      drawStar(0, 0, p.r * (0.6 + a * 0.6), p.color);
      ctx.restore();
    } else {
      ctx.globalAlpha = a;
      const g = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.r);
      g.addColorStop(0, p.color);
      g.addColorStop(1, 'rgba(255,255,255,0)');
      ctx.fillStyle = g;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, TAU);
      ctx.fill();
    }
  }
  ctx.globalAlpha = 1;
}

function drawStar(x, y, r, color, points) {
  points = points || 5;
  ctx.beginPath();
  for (let i = 0; i < points * 2; i++) {
    const rr = i % 2 === 0 ? r : r * 0.45;
    const a = (i / (points * 2)) * TAU - Math.PI / 2;
    const px = x + Math.cos(a) * rr, py = y + Math.sin(a) * rr;
    if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
  }
  ctx.closePath();
  ctx.fillStyle = color;
  ctx.fill();
}

/* ============================================================================
   OBJECTS — each blowable thing
   Physics model: pos, vel, mass. Wind applies force scaled by 1/mass.
   ========================================================================== */
class Obj {
  constructor(kind, x, y) {
    this.kind = kind;
    this.x = x; this.y = y;
    this.vx = 0; this.vy = 0;
    this.rot = rand(0, TAU);
    this.vr = rand(-0.4, 0.4);
    this.wob = rand(0, TAU);
    this.scale = 1;
    this.gone = false;         // pushed off-screen / cleared
    this.alive = true;
    this.settle = 0;           // for celebration pop
    this.spawnAnim = 0;        // 0..1 grow-in
    this.hueShift = rand(-15, 15);
    this.hit = 0;              // reaction flash
    this.baseY = y;
    this.driftPhase = rand(0, TAU);
    kindConfig[kind].init(this);
  }
  applyWind(fx, fy, power) {
    const inv = 1 / this.mass;
    this.vx += fx * inv * power;
    this.vy += fy * inv * power;
    this.hit = Math.min(1, this.hit + power * 0.5);
    kindConfig[this.kind].onWind(this, power);
  }
  update(dt) {
    if (this.spawnAnim < 1) this.spawnAnim = Math.min(1, this.spawnAnim + dt * 2.2);
    this.wob += dt * this.wobSpeed;
    kindConfig[this.kind].update(this, dt);
    this.x += this.vx * dt;
    this.y += this.vy * dt;
    this.rot += this.vr * dt;
    this.vx *= this.drag;
    this.vy *= this.drag;
    this.hit *= 0.9;
    // off-screen detection
    const m = this.size * 1.5;
    if (this.x < -m || this.x > W + m || this.y < -m || this.y > H + m) {
      if (!this.gone) { this.gone = true; onObjectCleared(this); }
    }
  }
  draw() {
    const s = this.scale * (0.3 + 0.7 * easeOutBack(this.spawnAnim));
    ctx.save();
    ctx.translate(this.x, this.y);
    ctx.scale(s, s);
    ctx.rotate(this.rot);
    kindConfig[this.kind].draw(this);
    ctx.restore();
  }
}

function easeOutBack(t) {
  const c1 = 1.70158, c3 = c1 + 1;
  return 1 + c3 * Math.pow(t - 1, 3) + c1 * Math.pow(t - 1, 2);
}

/* ---- per-kind config: physics + rendering ----------------------------- */
const kindConfig = {

  /* ---------------- DANDELION (meadow) ---------------- */
  dandelion: {
    init(o) {
      o.mass = 2.4; o.drag = 0.9; o.wobSpeed = 1.4; o.size = 46;
      o.imgName = 'dandelion-full';
      o.seeds = [];
      const n = 26;
      for (let i = 0; i < n; i++) {
        const a = (i / n) * TAU;
        const r = rand(20, 34);
        o.seeds.push({ a, r, ox: Math.cos(a) * r, oy: Math.sin(a) * r, gone: false, wob: rand(0, TAU) });
      }
      o.seedCount = n;
      o.stemH = rand(40, 70);
      o.rot = rand(-0.12, 0.12);   // stay upright, gentle sway (no free spin)
      o.vr = 0;
    },
    onWind(o, power) {
      if (power > 0.35) {
        // detach seeds one at a time
        const live = o.seeds.filter(s => !s.gone);
        const toRelease = Math.min(live.length, 1 + (power * 3 | 0));
        for (let i = 0; i < toRelease && live.length; i++) {
          const s = live[i]; if (!s) break;
          s.gone = true;
          spawnSeedFly(o.x + s.ox * o.scale, o.y + s.oy * o.scale, o.vx, o.vy);
        }
        if (toRelease > 0 && Math.random() < 0.5) Audio.sfx.seed();
      }
    },
    update(o, dt) {
      o.vx += Math.sin(o.wob) * 2 * dt;
      o.rot = Math.sin(o.wob) * 0.12;   // sway upright, never tumble
    },
    draw(o) {
      // real illustrated dandelion sprite; fade the head as seeds are blown away
      const remaining = o.seeds.filter(s => !s.gone).length;
      const frac = remaining / o.seedCount;
      ctx.globalAlpha = 0.55 + 0.45 * frac;
      drawImg('dandelion-full', 150, 44);
      ctx.globalAlpha = 1;
    },
    cleared(o) { return o.seeds.every(s => s.gone); }
  },

  /* ---------------- BUTTERFLY (meadow) ---------------- */
  butterfly: {
    init(o) {
      o.mass = 1.1; o.drag = 0.92; o.wobSpeed = 9; o.size = 34;
      const bv = pick([['butterfly-pink', '#ff9ec7'], ['butterfly-yellow', '#ffd166'], ['butterfly-purple', '#c39bff']]);
      o.imgName = bv[0]; o.color = bv[1];
      o.flap = 0; o.fear = 0;
    },
    onWind(o, power) {
      o.fear = Math.min(1, o.fear + power);
      if (power > 0.4 && Math.random() < 0.15) { Audio.sfx.butterfly(); }
      // flutter away in wind direction with lift
      o.vy -= power * 30;
    },
    update(o, dt) {
      o.flap += dt * (14 + o.fear * 24);
      // gentle autonomous flutter
      o.vx += Math.cos(o.wob * 0.7) * (18 + o.fear * 40) * dt;
      o.vy += Math.sin(o.wob) * 14 * dt - 6 * dt;
      o.fear *= 0.96;
      if (o.fear > 0.2 && Math.random() < 0.3) {
        addParticle({ type: 'star', x: o.x + rand(-10,10), y: o.y + rand(-10,10),
          vx: rand(-20,20), vy: rand(-20,20), life: 1, decay: 1.6, r: rand(2,4),
          color: o.color, rot: rand(0,TAU), spin: rand(-6,6) });
      }

// dandelion seed that flies off
function spawnSeedFly(x, y, wvx, wvy) {
  const a = Math.atan2(wvy, wvx) + rand(-0.6, 0.6);

  addParticle({
    type: 'seed', x, y,

    color: 'rgba(255,255,255,0.95)', grav: -6, spin: rand(-4, 4), rot: rand(0, TAU),
    render: 'seed'
  });
}

// color utils
function hexToRgb(h) {
  h = h.replace('#', '');
  if (h.length === 3) h = h.split('').map(c => c + c).join('');
  const n = parseInt(h, 16);
  return { r: (n >> 16) & 255, g: (n >> 8) & 255, b: n & 255 };
}
function lighten(hex, amt) {
  const c = hexToRgb(hex);
  return `rgb(${clamp(c.r + amt,0,255)|0},${clamp(c.g + amt,0,255)|0},${clamp(c.b + amt,0,255)|0})`;
}
function darken(hex, amt) { return lighten(hex, -amt); }
function rgba(hex, a) { const c = hexToRgb(hex); return `rgba(${c.r},${c.g},${c.b},${a})`; }
function mixHex(h1, h2, t) {
  const a = hexToRgb(h1), b = hexToRgb(h2);
  const r = Math.round(lerp(a.r, b.r, t)), g = Math.round(lerp(a.g, b.g, t)), bl = Math.round(lerp(a.b, b.b, t));
  return `rgb(${r},${g},${bl})`;
}
function softShadow(color, blur, ox, oy) {
  ctx.shadowColor = color; ctx.shadowBlur = blur;
  ctx.shadowOffsetX = ox || 0; ctx.shadowOffsetY = oy || 0;
}
function clearShadow() { ctx.shadowColor = 'transparent'; ctx.shadowBlur = 0; ctx.shadowOffsetX = 0; ctx.shadowOffsetY = 0; }

/* override particle draw for special seed puff */
const _origDrawParticles = drawParticles;
function drawParticlesExt() {
  for (const p of particles) {

    const a = clamp(p.life, 0, 1);

    drawImg('dandelion-seed', (p.r + 3) * 2.8);
    ctx.restore();
  }
  ctx.globalAlpha = 1;
}

/* ============================================================================
   POPPU MASCOT — cute round fox, procedurally drawn, reacts
   ========================================================================== */
const poppu = {
  x: 0, y: 0, size: 74,
  mood: 'idle',        // idle | excited | celebrate
  bounce: 0, blink: 0, blinkT: rand(2, 5),
  excite: 0, cheer: 0, t: 0, armWave: 0
};
function updatePoppu(dt) {
  poppu.t += dt;
  poppu.size = clamp(Math.min(W, H) * 0.11, 56, 96);
  const margin = poppu.size * 0.9;
  poppu.x = W - margin;
  poppu.y = H - margin * 0.85;

  poppu.blinkT -= dt;
  if (poppu.blinkT <= 0) { poppu.blink = 1; poppu.blinkT = rand(2.5, 5.5); }
  if (poppu.blink > 0) poppu.blink = Math.max(0, poppu.blink - dt * 7);

  poppu.excite = Math.max(0, poppu.excite - dt * 0.8);
  poppu.cheer = Math.max(0, poppu.cheer - dt);

  if (poppu.cheer > 0) poppu.mood = 'celebrate';
  else if (poppu.excite > 0.3) poppu.mood = 'excited';
  else poppu.mood = 'idle';

  const speed = poppu.mood === 'celebrate' ? 9 : poppu.mood === 'excited' ? 6 : 2.2;
  poppu.bounce = Math.sin(poppu.t * speed);
  poppu.armWave += dt * (poppu.mood === 'celebrate' ? 16 : poppu.mood === 'excited' ? 9 : 3);
}
function poppuReact(amount) { poppu.excite = Math.min(1.5, poppu.excite + amount); }
function poppuCelebrate() { poppu.cheer = 2.4; }

function drawPoppu() {
  const s = poppu.size / 74;
  const by = poppu.bounce * (poppu.mood === 'celebrate' ? 14 : poppu.mood === 'excited' ? 8 : 3);
  const breathe = poppu.mood === 'idle' ? 1 + Math.sin(poppu.t * 2.2) * 0.03 : 1;
  ctx.save();
  ctx.translate(poppu.x, poppu.y + by);
  ctx.scale(s, s);

  // ground shadow
  ctx.globalAlpha = 0.16;
  ctx.fillStyle = '#3a3a5a';
  ctx.beginPath(); ctx.ellipse(0, 46 - by * 0.4, 42, 10, 0, 0, TAU); ctx.fill();
  ctx.globalAlpha = 1;

  const squash = poppu.mood === 'celebrate' ? 1 + poppu.bounce * 0.06 : breathe;
  ctx.scale(1 / squash, squash);

  const celebrate = poppu.mood === 'celebrate';
  // ===== POPPU — real illustrated mascot sprite, chosen by mood =====
  const poppuImg = celebrate ? 'poppu-celebrate'
                 : poppu.mood === 'excited' ? 'poppu-excited'
                 : 'poppu-idle';
  drawImg(poppuImg, 150, -4);

  // ===== CELEBRATION STARS =====
  if (celebrate) {
    for (let k = 0; k < 5; k++) {
      const a = poppu.armWave * 0.5 + k * (TAU / 5);
      const rr = 42 + Math.sin(poppu.armWave + k) * 3;
      ctx.save();
      ctx.translate(Math.cos(a) * rr, -18 + Math.sin(a) * rr * 0.7);
      ctx.rotate(poppu.armWave + k);
      drawStar(0, 0, 3.6, `hsl(${(k * 62) % 360},100%,74%)`);
      ctx.restore();
    }
  }

  ctx.restore();
}

/* ---- backgrounds ---- */
function drawSkyGradient(colors) {
  const g = ctx.createLinearGradient(0, 0, 0, H);
  colors.forEach((c, i) => g.addColorStop(i / (colors.length - 1), c));
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, W, H);
}

function drawSoftCloud(x, y, s, tint) {
  ctx.save(); ctx.translate(x, y); ctx.scale(s, s);
  const lobes = [[-34, 4, 20], [-12, -8, 27], [14, -4, 24], [36, 5, 18], [4, 10, 25], [-24, 10, 17]];
  // merged silhouette in one path (union of lobes + base)
  const build = () => {
    ctx.beginPath();
    for (const [px, py, r] of lobes) { ctx.moveTo(px + r, py); ctx.arc(px, py, r, 0, TAU); }
    ctx.moveTo(48, 12); ctx.ellipse(0, 12, 48, 16, 0, 0, TAU);
  };
  build();
  const g = ctx.createLinearGradient(0, -30, 0, 28);
  g.addColorStop(0, '#ffffff'); g.addColorStop(0.6, tint || '#f4f8ff'); g.addColorStop(1, tint ? mixHex(tint, '#b9c8e6', 0.4) : '#d3ddf1');
  ctx.fillStyle = g; ctx.fill();
  // clipped inner highlight
  ctx.save(); build(); ctx.clip();
  const hg = ctx.createRadialGradient(-6, -18, 2, -6, -18, 46);
  hg.addColorStop(0, 'rgba(255,255,255,0.9)'); hg.addColorStop(1, 'rgba(255,255,255,0)');
  ctx.fillStyle = hg; ctx.fillRect(-60, -40, 120, 70);
  ctx.restore();
  ctx.restore();
}

function drawMeadowBG(dt) {
  // real illustrated meadow background (scaled to cover the screen)
  drawBGCover('bg-meadow');
  // illustrated wildflower foreground band tiled along the bottom (flower-set asset)
  const im = IMG['flower-set'];
  if (im && im.complete && im.naturalWidth) {
    const bh = clamp(H * 0.16, 80, 190);
    const bw = bh * (im.naturalWidth / im.naturalHeight);
    for (let x = -bw * 0.3; x < W + bw; x += bw * 0.92) {
      ctx.drawImage(im, x, H - bh, bw, bh);
    }
  }
}
function drawHill(y, colors, phase, amp) {
  amp = amp || 24;
  ctx.beginPath();
  ctx.moveTo(0, y);
  for (let x = 0; x <= W; x += 22) {
    const yy = y + Math.sin((x + phase) * 0.004) * amp + Math.sin((x + phase) * 0.017) * 6;
    ctx.lineTo(x, yy);
  }
  ctx.lineTo(W, H); ctx.lineTo(0, H); ctx.closePath();
  const g = ctx.createLinearGradient(0, y - amp, 0, H);
  g.addColorStop(0, colors[0]); g.addColorStop(1, colors[1]);
  ctx.fillStyle = g; ctx.fill();
}
function drawGrass() {
  const gy = H - 26;
  const gg = ctx.createLinearGradient(0, gy, 0, H);
  gg.addColorStop(0, '#82d071'); gg.addColorStop(1, '#57a54c');
  ctx.fillStyle = gg; ctx.fillRect(0, gy, W, 28);
  // textured blades
  ctx.strokeStyle = 'rgba(84,162,74,0.55)'; ctx.lineWidth = 2; ctx.lineCap = 'round';
  for (let x = 0; x < W; x += 10) {
    const h = 8 + ((x * 7) % 9);
    const lean = Math.sin(x * 0.3) * 3;
    ctx.beginPath(); ctx.moveTo(x, H); ctx.quadraticCurveTo(x + lean * 0.5, H - h * 0.6, x + lean, H - h); ctx.stroke();
  }
  ctx.strokeStyle = 'rgba(160,224,138,0.5)';
  for (let x = 5; x < W; x += 14) {
    const h = 6 + ((x * 5) % 7);
    ctx.beginPath(); ctx.moveTo(x, H); ctx.lineTo(x + Math.sin(x) * 2, H - h); ctx.stroke();
  }
  for (const f of flowers) drawFlower(f);
}
function drawFlower(f) {
  ctx.save();
  ctx.translate(f.x, f.y);
  ctx.rotate(f.rot);
  ctx.scale(f.s, f.s);
  // stem + leaf
  ctx.strokeStyle = '#57a34c'; ctx.lineWidth = 2; ctx.lineCap = 'round';
  ctx.beginPath(); ctx.moveTo(0, 2); ctx.quadraticCurveTo(2, 14, 0, 26); ctx.stroke();
  ctx.fillStyle = '#6bbf5c';
  ctx.beginPath(); ctx.ellipse(4, 15, 4, 2, 0.6, 0, TAU); ctx.fill();
  // petals
  const n = f.petals;
  for (let k = 0; k < n; k++) {
    ctx.save(); ctx.rotate((k / n) * TAU);
    const pg = ctx.createLinearGradient(0, 0, 0, -12);
    pg.addColorStop(0, f.c); pg.addColorStop(1, f.c2);
    ctx.fillStyle = pg;
    ctx.beginPath(); ctx.moveTo(0, 0);
    if (f.type === 0) {
      ctx.quadraticCurveTo(-4.5, -8, 0, -12.5);
      ctx.quadraticCurveTo(4.5, -8, 0, 0);
    } else {
      ctx.quadraticCurveTo(-3, -6, -1.5, -11.5);
      ctx.quadraticCurveTo(0, -13.5, 1.5, -11.5);
      ctx.quadraticCurveTo(3, -6, 0, 0);
    }
    ctx.fill();
    ctx.restore();
  }
  // center rounded square with dot detail
  const cg = ctx.createRadialGradient(-1, -1, 0, 0, 0, 5);
  cg.addColorStop(0, '#ffe9a8'); cg.addColorStop(1, '#f0a83a');
  ctx.fillStyle = cg;
  roundRect(ctx, -3.5, -3.5, 7, 7, 2.6); ctx.fill();
  ctx.fillStyle = 'rgba(178,118,40,0.5)';
  for (const [dx, dy] of [[-1.3, -1.3], [1.3, -1.3], [-1.3, 1.3], [1.3, 1.3]]) { ctx.beginPath(); ctx.arc(dx, dy, 0.7, 0, TAU); ctx.fill(); }
  ctx.restore();
}

function drawSkyBG(dt) {
  // real illustrated sky background (scaled to cover the screen)
  drawBGCover('bg-sky');
  // reveal a soft rainbow low in the sky as clouds get pushed away (scene logic kept)
  if (rainbowReveal > 0.01) {
    ctx.save();
    ctx.globalAlpha = clamp(rainbowReveal, 0, 1) * 0.9;
    const cx = W * 0.5, cy = H * 0.9;
    const bands = ['#ff6b8f','#ffb26b','#ffe66b','#8fe08f','#6bc6ff','#c39bff'];
    for (let i = 0; i < bands.length; i++) {
      ctx.strokeStyle = bands[i]; ctx.lineWidth = 16;
      ctx.beginPath();
      ctx.arc(cx, cy, Math.min(W,H) * 0.5 - i * 16, Math.PI, TAU);
      ctx.stroke();
    }
    ctx.restore();
  }
}

function drawMagicBG(dt) {
  // real illustrated magical night-sky background (scaled to cover the screen)
  drawBGCover('bg-magic');
}

/* ============================================================================
   WIND APPLICATION TO OBJECTS
   ========================================================================== */
function applyWindToObjects(dt) {
  if (trail.length === 0) return;
  // use recent trail points as wind sources
  const start = Math.max(0, trail.length - 14);
  for (const o of objects) {
    if (o.gone) continue;
    for (let i = start; i < trail.length; i++) {
      const t = trail[i];
      const radius = 120 + t.r * 120;
      const d2 = dist2(t.x, t.y, o.x, o.y);
      if (d2 < radius * radius) {
        const d = Math.sqrt(d2) || 1;
        const falloff = (1 - d / radius);
        const power = falloff * t.r * t.life * 1.4;
        // force direction: pointer velocity + slight push away from point
        const nx = (o.x - t.x) / d, ny = (o.y - t.y) / d;
        const fx = t.vx * 0.35 + nx * 120;
        const fy = t.vy * 0.35 + ny * 120;
        o.applyWind(fx, fy, power * dt * 3);
      }
    }
  }
}

/* ============================================================================
   CLEARING / CELEBRATION
   ========================================================================== */
function onObjectCleared(o) {
  // sparkle poof where it left
  const cx = clamp(o.x, 0, W), cy = clamp(o.y, 0, H);
  const col = o.color || '#fff';
  burst(cx, cy, typeof col === 'string' && col[0] === '#' ? col : '#fff', 10,
        { min: 40, max: 180, twinkle: true, rMin: 3, rMax: 7, grav: 30 });
  poppuReact(0.6);
  if (o.counts) {
    clearedCount++;
    Audio.sfx.giggle();
    checkSceneClear();
  }
  o.alive = false;
}

function checkSceneClear() {
  if (sceneState !== 'playing') return;
  if (clearedCount >= totalTarget && totalTarget > 0) {
    startCelebration();
  }
}

function startCelebration() {
  sceneState = 'celebrating';
  celebrateT = 0;
  nextFirework = 0.15;
  poppuCelebrate();
  Audio.sfx.celebrate();
  showHint('🎉 Yay! Great job!');
  // opening pop from center + first confetti burst
  spawnFirework(W * 0.5, H * 0.42);
  spawnConfettiRain(30);
}

const CONFETTI_COLORS = ['#ff8fb8','#ffd166','#8ec5ff','#a0e6a0','#c39bff','#ff9e6b','#7ee0d0','#ffffff'];
let nextFirework = 0;
const CELEBRATE_DUR = 3.0;

function spawnConfettiRain(n) {
  for (let i = 0; i < n; i++) {
    addParticle({
      type: 'confetti',
      x: rand(-20, W + 20), y: rand(-40, -10),
      vx: rand(-40, 40), vy: rand(120, 240),
      life: 1, decay: rand(0.28, 0.42),
      r: rand(4, 8), color: pick(CONFETTI_COLORS),
      grav: 60, airDrag: 0.995, sway: rand(20, 60),
      rot: rand(0, TAU), spin: rand(-9, 9)
    });
  }
}
function spawnFirework(x, y) {
  const hue = rand(0, 360);
  const n = randi(16, 24);
  for (let i = 0; i < n; i++) {
    const a = (i / n) * TAU + rand(-0.1, 0.1);
    const sp = rand(160, 340);
    addParticle({
      type: Math.random() < 0.5 ? 'star' : 'spark',
      x, y, vx: Math.cos(a) * sp, vy: Math.sin(a) * sp,
      life: 1, decay: rand(0.7, 1.3),
      r: rand(3, 7), color: `hsl(${(hue + rand(-25,25))|0},95%,72%)`,
      grav: 40, airDrag: 0.93, twinkle: true,
      rot: rand(0, TAU), spin: rand(-7, 7)
    });
  }
  // bright core flash
  addParticle({ type: 'spark', x, y, vx: 0, vy: 0, life: 1, decay: 2.4,
    r: 26, color: 'rgba(255,255,255,0.95)', grav: 0, airDrag: 0.9 });
  Audio.chime(rand(520, 720), [0, 4, 7, 12], 0.1);
}

function updateCelebration(dt) {
  celebrateT += dt;
  const t = celebrateT;

  // continuous confetti rain (eases off near the end)
  if (t < CELEBRATE_DUR - 0.4) spawnConfettiRain(t < 0.6 ? 8 : 4);

  // periodic fireworks in the upper area
  nextFirework -= dt;
  if (nextFirework <= 0 && t < CELEBRATE_DUR - 0.6) {
    nextFirework = rand(0.22, 0.42);
    spawnFirework(rand(W * 0.15, W * 0.85), rand(H * 0.15, H * 0.5));
  }

  // sparkle fountain from Poppu (he's dancing)
  if (Math.random() < 0.7) {
    burst(poppu.x, poppu.y - poppu.size * 0.5, `hsl(${rand(35,60)},100%,78%)`, 4,
          { min: 120, max: 300, up: 120, twinkle: true, rMin: 3, rMax: 6, grav: 120 });
  }

  if (t > CELEBRATE_DUR) {
    sceneState = 'transition';
    transT = 0;
  }
}

/* ============================================================================
   START SCREEN — fully illustrated on canvas
   ========================================================================== */
let startT = 0;

function drawMiniSeed() {
  // real illustrated dandelion-seed sprite
  drawImg('dandelion-seed', 30);
}

function drawStartTitle(cx, cy) {
  const word = 'Poppu Blow';
  const fs = clamp(Math.min(W, H) * 0.13, 40, 92);
  ctx.save();
  ctx.font = `900 ${fs}px "Trebuchet MS", "Segoe UI", sans-serif`;
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  const letters = word.split('');
  const widths = letters.map(ch => ctx.measureText(ch).width);
  const spacing = fs * 0.02;
  const total = widths.reduce((a, b) => a + b, 0) + spacing * (letters.length - 1);
  let x = cx - total / 2;
  const colors = ['#ff8fb8', '#ffb3d1', '#ffd166', '#8ec5ff', '#a0e6a0', '#c39bff', '#ff9e6b', '#7ee0d0', '#ff8fb8', '#8ec5ff'];
  for (let i = 0; i < letters.length; i++) {
    const ch = letters[i], w = widths[i];
    const lx = x + w / 2;
    const ly = cy + Math.sin(startT * 2 + i * 0.5) * 4;
    ctx.save();
    ctx.translate(lx, ly); ctx.rotate(Math.sin(i * 1.3) * 0.06);
    ctx.lineJoin = 'round';
    ctx.lineWidth = fs * 0.15; ctx.strokeStyle = colors[i % colors.length];
    ctx.strokeText(ch, 0, 0);
    softShadow('rgba(120,90,150,0.28)', 6, 0, 3);
    ctx.fillStyle = '#ffffff';
    ctx.fillText(ch, 0, 0);
    clearShadow();
    ctx.restore();
    x += w + spacing;
  }
  ctx.restore();
}

function drawCaptionBubble(cx, cy, text) {
  const fs = clamp(Math.min(W, H) * 0.032, 14, 22);
  ctx.save();
  ctx.font = `bold ${fs}px "Trebuchet MS", sans-serif`;
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  const tw = ctx.measureText(text).width;
  const bw = tw + fs * 2.2, bh = fs + fs * 1.4;
  softShadow('rgba(150,120,170,0.25)', 10, 0, 4);
  ctx.fillStyle = 'rgba(255,255,255,0.94)';
  roundRect(ctx, cx - bw / 2, cy - bh / 2, bw, bh, bh / 2); ctx.fill();
  clearShadow();
  ctx.beginPath(); ctx.moveTo(cx - 7, cy + bh / 2 - 2); ctx.lineTo(cx + 7, cy + bh / 2 - 2); ctx.lineTo(cx, cy + bh / 2 + 9); ctx.fill();
  ctx.fillStyle = '#a06fb0';
  ctx.fillText(text, cx, cy);
  ctx.restore();
}

function drawPlayButton(cx, cy) {
  const r = clamp(Math.min(W, H) * 0.09, 46, 82);
  ctx.save();
  // 3D base
  ctx.fillStyle = 'rgba(55,120,45,0.35)';
  roundRect(ctx, cx - r * 1.7, cy - r * 0.7 + 9, r * 3.4, r * 1.4, r * 0.7); ctx.fill();
  // body gradient
  const g = ctx.createLinearGradient(0, cy - r * 0.7, 0, cy + r * 0.7);
  g.addColorStop(0, '#8ee86a'); g.addColorStop(1, '#4fb43f');
  softShadow('rgba(80,180,60,0.5)', 18, 0, 6);
  ctx.fillStyle = g;
  roundRect(ctx, cx - r * 1.7, cy - r * 0.7, r * 3.4, r * 1.4, r * 0.7); ctx.fill();
  clearShadow();
  // top shine
  ctx.globalAlpha = 0.35; ctx.fillStyle = '#ffffff';
  roundRect(ctx, cx - r * 1.5, cy - r * 0.55, r * 3.0, r * 0.5, r * 0.25); ctx.fill();
  ctx.globalAlpha = 1;
  // play triangle + label as a centered group
  ctx.font = `900 ${r * 0.62}px "Trebuchet MS", sans-serif`;
  ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
  const label = 'Play';
  const tw = ctx.measureText(label).width;
  const ts = r * 0.4, gap = r * 0.28;
  let gx = cx - (ts + gap + tw) / 2;
  ctx.fillStyle = '#ffffff';
  ctx.beginPath(); ctx.moveTo(gx, cy - ts); ctx.lineTo(gx + ts, cy); ctx.lineTo(gx, cy + ts); ctx.closePath(); ctx.fill();
  ctx.fillText(label, gx + ts + gap, cy + 1);
  ctx.restore();
}

function drawStartScreen(dt) {
  startT += dt;
  // --- dawn pastel radial sky ---
  const sg = ctx.createRadialGradient(W * 0.5, H * 0.88, H * 0.05, W * 0.5, H * 0.18, H * 1.15);
  sg.addColorStop(0, '#fff6da'); sg.addColorStop(0.4, '#ffe6c8');
  sg.addColorStop(0.72, '#ffd2e6'); sg.addColorStop(1, '#d9c2ef');
  ctx.fillStyle = sg; ctx.fillRect(0, 0, W, H);
  // --- soft sun bloom ---
  const bloom = ctx.createRadialGradient(W * 0.22, H * 0.2, 10, W * 0.22, H * 0.2, H * 0.35);
  bloom.addColorStop(0, 'rgba(255,250,220,0.7)'); bloom.addColorStop(1, 'rgba(255,250,220,0)');
  ctx.fillStyle = bloom; ctx.beginPath(); ctx.arc(W * 0.22, H * 0.2, H * 0.35, 0, TAU); ctx.fill();
  // --- drifting clouds ---
  for (const c of bgClouds) {
    c.x += c.sp * dt; if (c.x > W + 90) c.x = -90;
    ctx.globalAlpha = 0.85; drawSoftCloud(c.x, c.y * 0.8, c.s * 0.85); ctx.globalAlpha = 1;
  }
  // --- rolling hills + grass ---
  drawHill(H * 0.82, ['#c2efb0', '#9bde8c'], 0, 26);
  drawHill(H * 0.9, ['#a2e18e', '#79cd6c'], 50, 30);
  drawGrass();
  // --- floating decorative objects ---
  ctx.save();
  ctx.translate(W * 0.15, H * 0.55 + Math.sin(startT * 0.9) * 14);
  ctx.scale(0.85, 0.85);
  kindConfig.balloon.draw({ squish: 0, color: '#ff8fb8', wob: startT, imgName: 'balloon-pink' });
  ctx.restore();
  ctx.save();
  ctx.translate(W * 0.84 + Math.sin(startT * 0.7) * 20, H * 0.34 + Math.cos(startT * 0.9) * 12);
  ctx.scale(1.15, 1.15); ctx.rotate(Math.sin(startT) * 0.2);
  kindConfig.butterfly.draw({ flap: startT * 7, color: '#c39bff', imgName: 'butterfly-purple' });
  ctx.restore();
  ctx.save();
  ctx.translate(W * 0.78 + Math.sin(startT * 0.5) * 26, H * 0.64 + Math.sin(startT * 0.8) * 10);
  kindConfig.feather.draw({ twirl: startT, color: '#fff0c8' });
  ctx.restore();
  for (let i = 0; i < 4; i++) {
    const sx = ((startT * 18 * (0.6 + i * 0.2) + i * W * 0.3) % (W + 80)) - 40;
    const sy = H * 0.28 + Math.sin(startT * 0.6 + i * 2) * 40 + i * 22;
    ctx.save(); ctx.translate(sx, sy); ctx.rotate(startT * 0.5 + i); drawMiniSeed(); ctx.restore();
  }
  // --- big Poppu centered (idle breathing/blink) ---
  poppu.t = startT; poppu.mood = 'idle';
  poppu.armWave += dt * 3;
  poppu.blinkT -= dt;
  if (poppu.blinkT <= 0) { poppu.blink = 1; poppu.blinkT = rand(2.5, 5.5); }
  if (poppu.blink > 0) poppu.blink = Math.max(0, poppu.blink - dt * 7);
  poppu.bounce = Math.sin(startT * 2.2);
  const sX = poppu.x, sY = poppu.y, sS = poppu.size;
  poppu.x = W * 0.5; poppu.y = H * 0.53; poppu.size = clamp(Math.min(W, H) * 0.24, 110, 210);
  for (let k = 0; k < 6; k++) {
    const a = startT * 0.8 + k * (TAU / 6);
    const rr = poppu.size * 0.95;
    const px = poppu.x + Math.cos(a) * rr, py = poppu.y - poppu.size * 0.45 + Math.sin(a) * rr * 0.7;
    const tw = 0.6 + Math.abs(Math.sin(startT * 2 + k)) * 0.6;
    ctx.save(); ctx.translate(px, py); ctx.rotate(startT + k);
    drawStar(0, 0, 5 * tw, `hsl(${(k * 60) % 360},100%,78%)`, 4);
    ctx.restore();
  }
  drawPoppu();
  poppu.x = sX; poppu.y = sY; poppu.size = sS;
  // --- title, caption, play button ---
  drawStartTitle(W * 0.5, H * 0.15);
  drawCaptionBubble(W * 0.5, H * 0.26, 'Drag to blow things away!');
  drawPlayButton(W * 0.5, H * 0.85 + Math.sin(startT * 2) * 6);
}

/* ============================================================================
   MAIN LOOP
   ========================================================================== */
let started = false;
let last = performance.now();
let idleTimer = 0;

function frame(now) {
  let dt = (now - last) / 1000;
  last = now;
  dt = Math.min(dt, 0.05);

  // --- update ---
  if (started) {
    updatePointer(dt);
    updatePoppu(dt);

    if (sceneState === 'playing') {
      applyWindToObjects(dt);
      idleTimer += dt;
      if (pointer.down) idleTimer = 0;
    }

    // reveal rainbow in sky scene based on cloud movement
    if (sceneIndex === 1) {
      let cloudMove = 0, clouds = 0;
      for (const o of objects) if (o.kind === 'cloud') { clouds++; cloudMove += o.reveal || 0; }
      if (clouds) rainbowReveal = lerp(rainbowReveal, cloudMove / clouds, 0.05);
    }

    for (const o of objects) if (!o.gone) o.update(dt);
    updateParticles(dt);

    if (sceneState === 'celebrating') updateCelebration(dt);
    if (sceneState === 'transition') {
      transT += dt;
      if (transT > 1.2) {
        loadScene(sceneIndex + 1);
        hideHint();
      }
    }
  }

  // --- draw ---
  ctx.clearRect(0, 0, W, H);
  if (!started) {
    drawStartScreen(dt);
    requestAnimationFrame(frame);
    return;
  }
  SCENES[sceneIndex].bg(dt);

  // objects sorted so heavy/background ones draw first
  const sorted = objects.filter(o => !o.gone).sort((a, b) => (a.mass) - (b.mass));
  for (const o of sorted) o.draw();

  drawWindTrail();
  drawParticles();
  drawParticlesExt();

  if (started) drawPoppu();

  // scene name pill + progress dots
  if (started) drawHUD();

  // transition fade
  if (sceneState === 'transition') {
    ctx.globalAlpha = clamp(transT / 1.2, 0, 1) * (transT < 0.6 ? transT/0.6 : (1.2-transT)/0.6);
    ctx.fillStyle = '#fff';
    ctx.fillRect(0, 0, W, H);
    ctx.globalAlpha = 1;
  }

  // idle hint
  if (started && sceneState === 'playing' && idleTimer > 4 && !pointer.down) {
    showHint('✋ Drag to make wind!');
  }

  requestAnimationFrame(frame);
}

function drawWindTrail() {
  if (trail.length < 2) return;
  ctx.save();
  ctx.lineCap = 'round'; ctx.lineJoin = 'round';
  // glow underlay
  for (let pass = 0; pass < 2; pass++) {
    ctx.beginPath();
    for (let i = 1; i < trail.length; i++) {
      const a = trail[i - 1], b = trail[i];
      ctx.moveTo(a.x, a.y);
      ctx.lineTo(b.x, b.y);
    }
    ctx.strokeStyle = pass === 0 ? 'rgba(200,240,255,0.25)' : 'rgba(255,255,255,0.6)';
    ctx.lineWidth = pass === 0 ? 26 : 10;
    ctx.globalAlpha = 0.6;
    ctx.stroke();
  }
  // per-seg alpha tips
  for (let i = 1; i < trail.length; i++) {
    const a = trail[i - 1], b = trail[i];
    ctx.globalAlpha = b.life * 0.5;
    ctx.strokeStyle = 'rgba(255,255,255,0.9)';
    ctx.lineWidth = b.r * 8;
    ctx.beginPath(); ctx.moveTo(a.x, a.y); ctx.lineTo(b.x, b.y); ctx.stroke();
  }
  ctx.restore();
  ctx.globalAlpha = 1;
}

function drawHUD() {
  // progress dots top-center
  const total = totalTarget;
  if (total <= 0) return;
  const done = clamp(clearedCount, 0, total);
  const r = 7, gap = 20;
  const wtot = total * gap;
  let x = W / 2 - wtot / 2 + gap / 2;
  const y = 30;
  // scene label
  ctx.save();
  ctx.font = 'bold 16px "Trebuchet MS", sans-serif';
  ctx.textAlign = 'center';
  ctx.fillStyle = 'rgba(255,255,255,0.85)';
  const label = SCENES[sceneIndex].name;
  const tw = ctx.measureText(label).width + 26;
  ctx.fillStyle = 'rgba(0,0,0,0.12)';
  roundRect(ctx, W/2 - tw/2, 46, tw, 26, 13); ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.fillText(label, W/2, 64);
  ctx.restore();

  for (let i = 0; i < total; i++) {
    ctx.beginPath();
    ctx.arc(x, y, r, 0, TAU);
    if (i < done) {
      ctx.fillStyle = '#ffe08a';
      ctx.fill();
      ctx.strokeStyle = 'rgba(255,255,255,0.9)'; ctx.lineWidth = 2; ctx.stroke();
    } else {
      ctx.fillStyle = 'rgba(255,255,255,0.35)';
      ctx.fill();
    }
    x += gap;
  }
}

/* ---- hint UI ---- */
const hintEl = document.getElementById('hint');
let hintTimer = null;
function showHint(text) {
  hintEl.textContent = text;
  hintEl.classList.add('show');
  clearTimeout(hintTimer);
  hintTimer = setTimeout(hideHint, 3000);
  idleTimer = 0;
}
function hideHint() { hintEl.classList.remove('show'); }

/* ============================================================================
   START
   ========================================================================== */
const startEl = document.getElementById('start');
function begin() {
  if (started) return;
  started = true;
  Audio.init(); Audio.resume();
  startEl.classList.add('hide');
  loadScene(0);
  setTimeout(() => showHint('✋ Drag to make wind!'), 600);
}
startEl.addEventListener('click', begin);
startEl.addEventListener('touchstart', function (e) { e.preventDefault(); begin(); }, { passive: false });

// keep audio alive on visibility
document.addEventListener('visibilitychange', () => { if (!document.hidden) Audio.resume(); });

// pre-build first scene invisibly so it's ready
loadScene(0);
started = false;

requestAnimationFrame(frame);

})();
</script>
</body>
</html>
