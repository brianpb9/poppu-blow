<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#bfe6f5">
<title>Poppu Blow</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    width: 100%; height: 100%; overflow: hidden;
    background: #bfe6f5;
    font-family: 'Trebuchet MS', 'Segoe UI', system-ui, sans-serif;
    touch-action: none; user-select: none; -webkit-user-select: none;
    overscroll-behavior: none;
  }
  #game { display: block; width: 100vw; height: 100vh; touch-action: none; }
  #start {
    position: fixed; inset: 0; z-index: 10;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    background: radial-gradient(circle at 50% 38%, #fff6da 0%, #ffe3c2 40%, #f6c9e0 100%);
    transition: opacity .6s ease; text-align: center; cursor: pointer;
  }
  #start.hide { opacity: 0; pointer-events: none; }
  #start h1 {
    font-size: clamp(38px, 12vw, 96px); color: #ff8fb8; letter-spacing: 2px;
    text-shadow: 0 4px 0 #fff, 0 8px 14px rgba(255,120,170,.35);
    margin-bottom: 6px; font-weight: 900;
  }
  #start .sub { font-size: clamp(15px, 4.5vw, 24px); color: #8a6db0; margin-bottom: 30px; font-weight: bold; }
  #start .play {
    font-size: clamp(20px, 6vw, 30px); color: #fff; font-weight: bold;
    background: linear-gradient(#7ed957, #57bf46); padding: 18px 54px; border-radius: 60px;
    box-shadow: 0 8px 0 #3f9a34, 0 14px 22px rgba(0,0,0,.18); animation: bob 1.6s ease-in-out infinite;
  }
  @keyframes bob { 0%,100%{ transform: translateY(0) } 50%{ transform: translateY(-9px) } }
  #hint {
    position: fixed; left: 50%; bottom: 26px; transform: translateX(-50%); z-index: 5;
    color: #6b5a8a; font-size: clamp(13px, 4vw, 18px); font-weight: bold;
    background: rgba(255,255,255,.55); padding: 9px 20px; border-radius: 40px;
    pointer-events: none; opacity: 0; transition: opacity .5s; backdrop-filter: blur(3px);
  }
  #hint.show { opacity: 1; }
</style>
</head>
<body>
<canvas id="game"></canvas>
<div id="hint">✋ Drag to make wind!</div>
<div id="start">
  <h1>Poppu&nbsp;Blow</h1>
  <div class="sub">🦊 Drag to blow things away!</div>
  <div class="play">▶ Play</div>
</div>

<script>
"use strict";
(function () {
/* ============================================================================
   POPPU BLOW — a toddler wind game
   Single file, vanilla JS, Canvas 2D, Web Audio. No dependencies.
   ========================================================================== */

const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

let W = 0, H = 0, DPR = 1;
function resize() {
  DPR = Math.min(window.devicePixelRatio || 1, 2.5);
  W = window.innerWidth; H = window.innerHeight;
  canvas.width = Math.floor(W * DPR);
  canvas.height = Math.floor(H * DPR);
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
}
window.addEventListener('resize', resize);
resize();

/* ---- helpers ---------------------------------------------------------- */
const TAU = Math.PI * 2;
const rand = (a, b) => a + Math.random() * (b - a);
const randi = (a, b) => Math.floor(rand(a, b + 1));
const pick = arr => arr[(Math.random() * arr.length) | 0];
const clamp = (v, a, b) => v < a ? a : v > b ? b : v;
const lerp = (a, b, t) => a + (b - a) * t;
const dist2 = (x1, y1, x2, y2) => { const dx = x2 - x1, dy = y2 - y1; return dx * dx + dy * dy; };
function roundRect(c, x, y, w, h, r) {
  c.beginPath();
  c.moveTo(x + r, y);
  c.arcTo(x + w, y, x + w, y + h, r);
  c.arcTo(x + w, y + h, x, y + h, r);
  c.arcTo(x, y + h, x, y, r);
  c.arcTo(x, y, x + w, y, r);
  c.closePath();
}

/* ============================================================================
   AUDIO — Web Audio API, all synthesized
   ========================================================================== */
const Audio = (function () {
  let ac = null, master = null, ready = false;
  let windGain = null, windFilter = null, windSrc = null, windLFO = null;
  let noiseBuf = null;

  function init() {
    if (ac) return;
    try {
      ac = new (window.AudioContext || window.webkitAudioContext)();
    } catch (e) { return; }
    master = ac.createGain();
    master.gain.value = 0.85;
    master.connect(ac.destination);

    // pink-ish noise buffer for wind
    const len = ac.sampleRate * 2;
    noiseBuf = ac.createBuffer(1, len, ac.sampleRate);
    const d = noiseBuf.getChannelData(0);
    let b0 = 0, b1 = 0, b2 = 0;
    for (let i = 0; i < len; i++) {
      const white = Math.random() * 2 - 1;
      b0 = 0.99765 * b0 + white * 0.0990460;
      b1 = 0.96300 * b1 + white * 0.2965164;
      b2 = 0.57000 * b2 + white * 1.0526913;
      d[i] = (b0 + b1 + b2 + white * 0.1848) * 0.16;
    }

    // continuous wind bed (gain rides with drag speed)
    windSrc = ac.createBufferSource();
    windSrc.buffer = noiseBuf; windSrc.loop = true;
    windFilter = ac.createBiquadFilter();
    windFilter.type = 'bandpass'; windFilter.frequency.value = 550; windFilter.Q.value = 0.7;
    windGain = ac.createGain(); windGain.gain.value = 0;
    windLFO = ac.createOscillator(); windLFO.type = 'sine'; windLFO.frequency.value = 0.7;
    const lfoGain = ac.createGain(); lfoGain.gain.value = 180;
    windLFO.connect(lfoGain); lfoGain.connect(windFilter.frequency);
    windSrc.connect(windFilter); windFilter.connect(windGain); windGain.connect(master);
    windSrc.start(); windLFO.start();
    ready = true;
  }

  function resume() { if (ac && ac.state === 'suspended') ac.resume(); }

  function setWind(intensity) {
    if (!ready) return;
    const t = ac.currentTime;
    windGain.gain.setTargetAtTime(clamp(intensity, 0, 1) * 0.18, t, 0.08);
    windFilter.frequency.setTargetAtTime(400 + intensity * 900, t, 0.12);
  }

  // simple tone with envelope
  function tone(freq, dur, type, vol, opts) {
    if (!ready) return;
    opts = opts || {};
    const t = ac.currentTime;
    const o = ac.createOscillator();
    const g = ac.createGain();
    o.type = type || 'sine';
    o.frequency.setValueAtTime(freq, t);
    if (opts.glideTo) o.frequency.exponentialRampToValueAtTime(opts.glideTo, t + dur);
    g.gain.setValueAtTime(0.0001, t);
    g.gain.exponentialRampToValueAtTime(vol, t + (opts.attack || 0.01));
    g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
    o.connect(g);
    if (opts.filter) {
      const f = ac.createBiquadFilter();
      f.type = 'lowpass'; f.frequency.value = opts.filter;
      g.connect(f); f.connect(master);
    } else g.connect(master);
    o.start(t); o.stop(t + dur + 0.05);
  }

  // little musical sparkle (rising arpeggio)
  function chime(base, steps, vol) {
    if (!ready) return;
    const notes = steps || [0, 4, 7, 12];
    notes.forEach((s, i) => {
      const f = (base || 523) * Math.pow(2, s / 12);
      setTimeout(() => tone(f, 0.5, 'sine', (vol || 0.15), { attack: 0.02, filter: 3500 }), i * 70);
    });
  }

  // object-specific pops
  const sfx = {
    seed()   { tone(rand(900,1300), 0.18, 'sine', 0.10, { attack: 0.005, glideTo: rand(1500,2200), filter: 4000 }); },
    balloon(){ tone(rand(300,460), 0.22, 'square', 0.12, { attack: 0.005, glideTo: rand(700,950), filter: 1600 }); },
    butterfly(){ Audio.chime(rand(700,900), [0, 5, 9], 0.07); },
    cloud()  { tone(rand(160,230), 0.5, 'sine', 0.09, { attack: 0.06, filter: 900 }); },
    feather(){ tone(rand(1200,1700), 0.3, 'sine', 0.06, { attack: 0.03, glideTo: rand(600,900), filter: 5000 }); },
    bubble() { tone(rand(500,800), 0.14, 'sine', 0.09, { attack: 0.004, glideTo: rand(1100,1700), filter: 4500 }); },
    pop()    { tone(rand(600,900), 0.09, 'sine', 0.11, { attack: 0.003, glideTo: rand(1300,1900), filter: 5000 }); },
    orb()    { Audio.chime(rand(600,760), [0, 4, 7, 11], 0.09); },
    wisp()   { tone(rand(800,1100), 0.4, 'triangle', 0.07, { attack: 0.04, glideTo: rand(1400,1900), filter: 4000 }); },
    giggle() {
      const notes = [0, 3, -2, 5, 2];
      notes.forEach((s, i) => setTimeout(() => tone(660 * Math.pow(2, s/12), 0.16, 'sine', 0.10, { attack: 0.01, filter: 3000 }), i * 90));
    },
    celebrate() {
      Audio.chime(523, [0, 4, 7, 12, 16, 19], 0.16);
      setTimeout(() => Audio.chime(587, [0, 4, 7, 12], 0.13), 300);
    },
    whoosh() { tone(220, 0.4, 'sine', 0.05, { attack: 0.05, glideTo: 90, filter: 700 }); }
  };

  return { init, resume, setWind, tone, chime, sfx };
})();

/* ============================================================================
   POINTER / WIND INPUT
   ========================================================================== */
const pointer = {
  x: 0, y: 0, px: 0, py: 0, vx: 0, vy: 0, speed: 0,
  down: false, active: false, lastT: 0
};

function pointerPos(e) {
  const t = e.touches ? e.touches[0] : e;
  return { x: t.clientX, y: t.clientY };
}
function onDown(e) {
  Audio.init(); Audio.resume();
  const p = pointerPos(e);
  pointer.down = true; pointer.active = true;
  pointer.x = pointer.px = p.x; pointer.y = pointer.py = p.y;
  pointer.vx = pointer.vy = 0; pointer.speed = 0;
  pointer.lastT = performance.now();
  hideHint();
  e.preventDefault();
}
function onMove(e) {
  if (!pointer.down) return;
  const p = pointerPos(e);
  pointer.x = p.x; pointer.y = p.y;
  e.preventDefault();
}
function onUp(e) {
  pointer.down = false;
  if (e) e.preventDefault();
}
canvas.addEventListener('mousedown', onDown);
window.addEventListener('mousemove', onMove);
window.addEventListener('mouseup', onUp);
canvas.addEventListener('touchstart', onDown, { passive: false });
canvas.addEventListener('touchmove', onMove, { passive: false });
window.addEventListener('touchend', onUp, { passive: false });
window.addEventListener('touchcancel', onUp, { passive: false });

// wind trail sampling
const trail = [];
function updatePointer(dt) {
  const now = performance.now();
  if (pointer.down) {
    const ndt = Math.max(0.001, (now - pointer.lastT) / 1000);
    let nvx = (pointer.x - pointer.px) / ndt;
    let nvy = (pointer.y - pointer.py) / ndt;
    // smooth velocity
    pointer.vx = lerp(pointer.vx, nvx, 0.5);
    pointer.vy = lerp(pointer.vy, nvy, 0.5);
    pointer.speed = Math.hypot(pointer.vx, pointer.vy);
    pointer.px = pointer.x; pointer.py = pointer.y; pointer.lastT = now;

    if (pointer.speed > 40) {
      trail.push({ x: pointer.x, y: pointer.y, vx: pointer.vx, vy: pointer.vy,
                   life: 1, r: clamp(pointer.speed / 900, 0.35, 1) });
      spawnWindParticles();
    }
  } else {
    pointer.speed = lerp(pointer.speed, 0, 0.2);
    pointer.vx = lerp(pointer.vx, 0, 0.2);
    pointer.vy = lerp(pointer.vy, 0, 0.2);
  }
  Audio.setWind(clamp(pointer.speed / 1400, 0, 1) * (pointer.down ? 1 : 0.15));

  for (let i = trail.length - 1; i >= 0; i--) {
    trail[i].life -= dt * 1.7;
    if (trail[i].life <= 0) trail.splice(i, 1);
  }
  if (trail.length > 90) trail.splice(0, trail.length - 90);
}

/* ============================================================================
   PARTICLES (generic soft particles + wind wisps)
   ========================================================================== */
const particles = [];
function addParticle(p) { particles.push(p); }

function spawnWindParticles() {
  const n = clamp((pointer.speed / 500) | 0, 1, 3);
  for (let i = 0; i < n; i++) {
    const a = Math.atan2(pointer.vy, pointer.vx) + rand(-0.4, 0.4);
    const sp = pointer.speed * rand(0.15, 0.4);
    addParticle({
      type: 'wind',
      x: pointer.x + rand(-14, 14), y: pointer.y + rand(-14, 14),
      vx: Math.cos(a) * sp, vy: Math.sin(a) * sp,
      life: 1, decay: rand(1.4, 2.4), r: rand(5, 13),
      hue: 190 + rand(-20, 30)
    });
  }
}

function burst(x, y, color, count, opts) {
  opts = opts || {};
  for (let i = 0; i < count; i++) {
    const a = rand(0, TAU);
    const sp = rand(opts.min || 60, opts.max || 260);
    addParticle({
      type: opts.type || 'spark',
      x, y, vx: Math.cos(a) * sp, vy: Math.sin(a) * sp - (opts.up || 0),
      life: 1, decay: rand(0.8, 1.7), r: rand(opts.rMin || 3, opts.rMax || 8),
      color: color, grav: opts.grav != null ? opts.grav : 40,
      spin: rand(-8, 8), rot: rand(0, TAU),
      twinkle: opts.twinkle
    });
  }
}

function updateParticles(dt) {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.life -= dt * p.decay;
    if (p.life <= 0) { particles.splice(i, 1); continue; }
    p.x += p.vx * dt; p.y += p.vy * dt;
    if (p.grav) p.vy += p.grav * dt;
    const dr = p.airDrag != null ? p.airDrag : 0.98;
    p.vx *= dr; p.vy *= dr;
    if (p.spin) p.rot += p.spin * dt;
    if (p.sway) p.x += Math.sin((p.rot || 0) + p.life * 6) * p.sway * dt;
  }
  if (particles.length > 600) particles.splice(0, particles.length - 600);
}

function drawParticles() {
  for (const p of particles) {
    const a = clamp(p.life, 0, 1);
    if (p.type === 'wind') {
      ctx.globalAlpha = a * 0.5;
      ctx.fillStyle = `hsl(${p.hue}, 80%, 88%)`;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r * (0.5 + a * 0.7), 0, TAU);
      ctx.fill();
    } else if (p.type === 'confetti') {
      ctx.save();
      ctx.globalAlpha = a;
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rot);
      ctx.fillStyle = p.color;
      const w = p.r * 1.6, h = p.r * 2.4 * (0.5 + 0.5 * Math.abs(Math.cos(p.rot * 1.3)));
      roundRect(ctx, -w / 2, -h / 2, w, h, 2);
      ctx.fill();
      ctx.restore();
    } else if (p.type === 'star' || p.twinkle) {
      ctx.save();
      ctx.globalAlpha = a;
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rot);
      drawStar(0, 0, p.r * (0.6 + a * 0.6), p.color);
      ctx.restore();
    } else {
      ctx.globalAlpha = a;
      const g = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.r);
      g.addColorStop(0, p.color);
      g.addColorStop(1, 'rgba(255,255,255,0)');
      ctx.fillStyle = g;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, TAU);
      ctx.fill();
    }
  }
  ctx.globalAlpha = 1;
}

function drawStar(x, y, r, color, points) {
  points = points || 5;
  ctx.beginPath();
  for (let i = 0; i < points * 2; i++) {
    const rr = i % 2 === 0 ? r : r * 0.45;
    const a = (i / (points * 2)) * TAU - Math.PI / 2;
    const px = x + Math.cos(a) * rr, py = y + Math.sin(a) * rr;
    if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
  }
  ctx.closePath();
  ctx.fillStyle = color;
  ctx.fill();
}

/* ============================================================================
   OBJECTS — each blowable thing
   Physics model: pos, vel, mass. Wind applies force scaled by 1/mass.
   ========================================================================== */
class Obj {
  constructor(kind, x, y) {
    this.kind = kind;
    this.x = x; this.y = y;
    this.vx = 0; this.vy = 0;
    this.rot = rand(0, TAU);
    this.vr = rand(-0.4, 0.4);
    this.wob = rand(0, TAU);
    this.scale = 1;
    this.gone = false;         // pushed off-screen / cleared
    this.alive = true;
    this.settle = 0;           // for celebration pop
    this.spawnAnim = 0;        // 0..1 grow-in
    this.hueShift = rand(-15, 15);
    this.hit = 0;              // reaction flash
    this.baseY = y;
    this.driftPhase = rand(0, TAU);
    kindConfig[kind].init(this);
  }
  applyWind(fx, fy, power) {
    const inv = 1 / this.mass;
    this.vx += fx * inv * power;
    this.vy += fy * inv * power;
    this.hit = Math.min(1, this.hit + power * 0.5);
    kindConfig[this.kind].onWind(this, power);
  }
  update(dt) {
    if (this.spawnAnim < 1) this.spawnAnim = Math.min(1, this.spawnAnim + dt * 2.2);
    this.wob += dt * this.wobSpeed;
    kindConfig[this.kind].update(this, dt);
    this.x += this.vx * dt;
    this.y += this.vy * dt;
    this.rot += this.vr * dt;
    this.vx *= this.drag;
    this.vy *= this.drag;
    this.hit *= 0.9;
    // off-screen detection
    const m = this.size * 1.5;
    if (this.x < -m || this.x > W + m || this.y < -m || this.y > H + m) {
      if (!this.gone) { this.gone = true; onObjectCleared(this); }
    }
  }
  draw() {
    const s = this.scale * (0.3 + 0.7 * easeOutBack(this.spawnAnim));
    ctx.save();
    ctx.translate(this.x, this.y);
    ctx.scale(s, s);
    ctx.rotate(this.rot);
    kindConfig[this.kind].draw(this);
    ctx.restore();
  }
}

function easeOutBack(t) {
  const c1 = 1.70158, c3 = c1 + 1;
  return 1 + c3 * Math.pow(t - 1, 3) + c1 * Math.pow(t - 1, 2);
}

/* ---- per-kind config: physics + rendering ----------------------------- */
const kindConfig = {

  /* ---------------- DANDELION (meadow) ---------------- */
  dandelion: {
    init(o) {
      o.mass = 2.4; o.drag = 0.9; o.wobSpeed = 1.4; o.size = 46;
      o.seeds = [];
      const n = 26;
      for (let i = 0; i < n; i++) {
        const a = (i / n) * TAU;
        const r = rand(20, 34);
        o.seeds.push({ a, r, ox: Math.cos(a) * r, oy: Math.sin(a) * r, gone: false, wob: rand(0, TAU) });
      }
      o.seedCount = n;
      o.stemH = rand(40, 70);
      o.rot = rand(-0.12, 0.12);   // stay upright, gentle sway (no free spin)
      o.vr = 0;
    },
    onWind(o, power) {
      if (power > 0.35) {
        // detach seeds one at a time
        const live = o.seeds.filter(s => !s.gone);
        const toRelease = Math.min(live.length, 1 + (power * 3 | 0));
        for (let i = 0; i < toRelease && live.length; i++) {
          const s = live[i]; if (!s) break;
          s.gone = true;
          spawnSeedFly(o.x + s.ox * o.scale, o.y + s.oy * o.scale, o.vx, o.vy);
        }
        if (toRelease > 0 && Math.random() < 0.5) Audio.sfx.seed();
      }
    },
    update(o, dt) {
      o.vx += Math.sin(o.wob) * 2 * dt;
      o.rot = Math.sin(o.wob) * 0.12;   // sway upright, never tumble
    },
    draw(o) {
      const remaining = o.seeds.filter(s => !s.gone).length;
      // stem
      ctx.strokeStyle = '#7fc97a'; ctx.lineWidth = 5; ctx.lineCap = 'round';
      ctx.beginPath(); ctx.moveTo(0, 6); ctx.quadraticCurveTo(4, o.stemH * 0.6, 2, o.stemH); ctx.stroke();
      // fluff head
      if (remaining > 0) {
        // center
        ctx.fillStyle = '#e9d9a0';
        ctx.beginPath(); ctx.arc(0, 0, 8, 0, TAU); ctx.fill();
        for (const s of o.seeds) {
          if (s.gone) continue;
          const wob = Math.sin(o.wob + s.a * 3) * 1.5;
          const ex = Math.cos(s.a) * (s.r + wob), ey = Math.sin(s.a) * (s.r + wob);
          ctx.strokeStyle = 'rgba(245,250,255,0.75)';
          ctx.lineWidth = 1.4;
          ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(ex, ey); ctx.stroke();
          // seed puff
          ctx.fillStyle = 'rgba(255,255,255,0.92)';
          ctx.beginPath(); ctx.arc(ex, ey, 3.4, 0, TAU); ctx.fill();
          ctx.fillStyle = 'rgba(230,215,180,0.9)';
          ctx.beginPath(); ctx.arc(ex, ey, 1.2, 0, TAU); ctx.fill();
        }
      } else {
        // bare head — will clear soon
        ctx.fillStyle = '#d8c88f';
        ctx.beginPath(); ctx.arc(0, 0, 7, 0, TAU); ctx.fill();
      }
    },
    cleared(o) { return o.seeds.every(s => s.gone); }
  },

  /* ---------------- BUTTERFLY (meadow) ---------------- */
  butterfly: {
    init(o) {
      o.mass = 1.1; o.drag = 0.92; o.wobSpeed = 9; o.size = 34;
      o.color = pick(['#ff9ec7', '#ffd166', '#c39bff', '#8be0d4', '#ff8f6b']);
      o.flap = 0; o.fear = 0;
    },
    onWind(o, power) {
      o.fear = Math.min(1, o.fear + power);
      if (power > 0.4 && Math.random() < 0.15) { Audio.sfx.butterfly(); }
      // flutter away in wind direction with lift
      o.vy -= power * 30;
    },
    update(o, dt) {
      o.flap += dt * (14 + o.fear * 24);
      // gentle autonomous flutter
      o.vx += Math.cos(o.wob * 0.7) * (18 + o.fear * 40) * dt;
      o.vy += Math.sin(o.wob) * 14 * dt - 6 * dt;
      o.fear *= 0.96;
      if (o.fear > 0.2 && Math.random() < 0.3) {
        addParticle({ type: 'star', x: o.x + rand(-10,10), y: o.y + rand(-10,10),
          vx: rand(-20,20), vy: rand(-20,20), life: 1, decay: 1.6, r: rand(2,4),
          color: o.color, rot: rand(0,TAU), spin: rand(-6,6) });
      }

// dandelion seed that flies off
function spawnSeedFly(x, y, wvx, wvy) {
  const a = Math.atan2(wvy, wvx) + rand(-0.6, 0.6);
  const sp = Math.hypot(wvx, wvy) * rand(0.4, 0.9) + rand(30, 80);
  addParticle({
    type: 'seed', x, y,
    vx: Math.cos(a) * sp, vy: Math.sin(a) * sp - rand(10, 40),
    life: 1, decay: rand(0.4, 0.7), r: rand(3, 5),
    color: 'rgba(255,255,255,0.95)', grav: -6, spin: rand(-4, 4), rot: rand(0, TAU),
    render: 'seed'
  });
}

// color utils
function hexToRgb(h) {
  h = h.replace('#', '');
  if (h.length === 3) h = h.split('').map(c => c + c).join('');
  const n = parseInt(h, 16);
  return { r: (n >> 16) & 255, g: (n >> 8) & 255, b: n & 255 };
}
function lighten(hex, amt) {
  const c = hexToRgb(hex);
  return `rgb(${clamp(c.r + amt,0,255)|0},${clamp(c.g + amt,0,255)|0},${clamp(c.b + amt,0,255)|0})`;
}
function darken(hex, amt) { return lighten(hex, -amt); }

/* override particle draw for special seed puff */
const _origDrawParticles = drawParticles;
function drawParticlesExt() {
  for (const p of particles) {
    if (p.render === 'seed') {
      const a = clamp(p.life, 0, 1);
      ctx.save();
      ctx.globalAlpha = a;
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rot || 0);
      // fluffy seed: little puff + stem
      ctx.strokeStyle = 'rgba(220,205,170,0.8)'; ctx.lineWidth = 1;
      ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(0, p.r + 4); ctx.stroke();
      ctx.fillStyle = 'rgba(255,255,255,0.95)';
      for (let k = 0; k < 6; k++) {
        const ang = (k / 6) * TAU;
        ctx.beginPath();
        ctx.arc(Math.cos(ang) * p.r, Math.sin(ang) * p.r - 0, 1.6, 0, TAU);
        ctx.fill();
      }
      ctx.fillStyle = 'rgba(230,215,180,1)';
      ctx.beginPath(); ctx.arc(0, 0, 1.6, 0, TAU); ctx.fill();
      ctx.restore();
    }
  }
  ctx.globalAlpha = 1;
}

/* ============================================================================
   POPPU MASCOT — cute round fox, procedurally drawn, reacts
   ========================================================================== */
const poppu = {
  x: 0, y: 0, size: 74,
  mood: 'idle',        // idle | excited | celebrate
  bounce: 0, blink: 0, blinkT: rand(2, 5),
  excite: 0, cheer: 0, t: 0, armWave: 0
};
function updatePoppu(dt) {
  poppu.t += dt;
  poppu.size = clamp(Math.min(W, H) * 0.11, 56, 96);
  const margin = poppu.size * 0.9;
  poppu.x = W - margin;
  poppu.y = H - margin * 0.85;

  poppu.blinkT -= dt;
  if (poppu.blinkT <= 0) { poppu.blink = 1; poppu.blinkT = rand(2.5, 5.5); }
  if (poppu.blink > 0) poppu.blink = Math.max(0, poppu.blink - dt * 7);

  poppu.excite = Math.max(0, poppu.excite - dt * 0.8);
  poppu.cheer = Math.max(0, poppu.cheer - dt);

  if (poppu.cheer > 0) poppu.mood = 'celebrate';
  else if (poppu.excite > 0.3) poppu.mood = 'excited';
  else poppu.mood = 'idle';

  const speed = poppu.mood === 'celebrate' ? 9 : poppu.mood === 'excited' ? 6 : 2.2;
  poppu.bounce = Math.sin(poppu.t * speed);
  poppu.armWave += dt * (poppu.mood === 'celebrate' ? 16 : poppu.mood === 'excited' ? 9 : 3);
}
function poppuReact(amount) { poppu.excite = Math.min(1.5, poppu.excite + amount); }
function poppuCelebrate() { poppu.cheer = 2.4; }

function drawPoppu() {
  const s = poppu.size / 74;
  const by = poppu.bounce * (poppu.mood === 'celebrate' ? 14 : poppu.mood === 'excited' ? 8 : 3);
  ctx.save();
  ctx.translate(poppu.x, poppu.y + by);
  ctx.scale(s, s);

  // ground shadow
  ctx.globalAlpha = 0.16;
  ctx.fillStyle = '#3a3a5a';
  ctx.beginPath(); ctx.ellipse(0, 44 - by * 0.4, 40, 10, 0, 0, TAU); ctx.fill();
  ctx.globalAlpha = 1;

  const squash = poppu.mood === 'celebrate' ? 1 + poppu.bounce * 0.06 : 1;
  ctx.scale(1 / squash, squash);

  const O = '#ff9a56';       // orange body
  const OD = '#f07d3a';
  const CREAM = '#fff2e0';

  // tail
  ctx.save();
  ctx.rotate(Math.sin(poppu.armWave * 0.5) * 0.15 + 0.3);
  ctx.fillStyle = O;
  ctx.beginPath();
  ctx.moveTo(-24, 18);
  ctx.quadraticCurveTo(-52, 6, -46, -18);
  ctx.quadraticCurveTo(-30, -6, -20, 10);
  ctx.fill();
  ctx.fillStyle = CREAM;
  ctx.beginPath();
  ctx.moveTo(-42, -14);
  ctx.quadraticCurveTo(-52, -2, -44, 4);
  ctx.quadraticCurveTo(-40, -6, -42, -14);
  ctx.fill();
  ctx.restore();

  // arms (wave when excited/celebrate)
  const armUp = poppu.mood !== 'idle';
  const wave = Math.sin(poppu.armWave) * (armUp ? 0.5 : 0.12);
  ctx.strokeStyle = O; ctx.lineWidth = 9; ctx.lineCap = 'round';
  // left arm
  ctx.save(); ctx.translate(-26, 8);
  ctx.rotate(armUp ? -2.3 + wave : -0.5 + wave);
  ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(16, 0); ctx.stroke();
  ctx.restore();
  // right arm
  ctx.save(); ctx.translate(26, 8);
  ctx.rotate(armUp ? 2.3 - wave : 0.5 - wave);
  ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(-16, 0); ctx.stroke();
  ctx.restore();

  // body
  ctx.fillStyle = O;
  ctx.beginPath();
  ctx.ellipse(0, 14, 26, 26, 0, 0, TAU); ctx.fill();
  // belly
  ctx.fillStyle = CREAM;
  ctx.beginPath();
  ctx.ellipse(0, 18, 15, 17, 0, 0, TAU); ctx.fill();

  // head
  ctx.fillStyle = O;
  ctx.beginPath();
  ctx.ellipse(0, -18, 30, 27, 0, 0, TAU); ctx.fill();

  // ears
  for (const dir of [-1, 1]) {
    ctx.fillStyle = O;
    ctx.beginPath();
    ctx.moveTo(dir * 14, -38);
    ctx.lineTo(dir * 30, -58);
    ctx.lineTo(dir * 30, -34);
    ctx.closePath(); ctx.fill();
    ctx.fillStyle = '#ffc9a0';
    ctx.beginPath();
    ctx.moveTo(dir * 18, -38);
    ctx.lineTo(dir * 27, -50);
    ctx.lineTo(dir * 27, -35);
    ctx.closePath(); ctx.fill();
  }

  // cheeks cream
  ctx.fillStyle = CREAM;
  ctx.beginPath(); ctx.ellipse(0, -10, 22, 16, 0, 0, TAU); ctx.fill();

  // blush
  ctx.fillStyle = 'rgba(255,150,150,0.55)';
  ctx.beginPath(); ctx.ellipse(-16, -8, 6, 4, 0, 0, TAU); ctx.fill();
  ctx.beginPath(); ctx.ellipse(16, -8, 6, 4, 0, 0, TAU); ctx.fill();

  // eyes
  const eyeOpen = 1 - poppu.blink;
  const celebrate = poppu.mood === 'celebrate';
  ctx.fillStyle = '#3a2e4a';
  for (const dir of [-1, 1]) {
    ctx.save();
    ctx.translate(dir * 11, -18);
    if (celebrate) {
      // happy closed ^ ^ eyes
      ctx.strokeStyle = '#3a2e4a'; ctx.lineWidth = 3.5; ctx.lineCap = 'round';
      ctx.beginPath();
      ctx.moveTo(-5, 1); ctx.quadraticCurveTo(0, -6, 5, 1); ctx.stroke();
    } else {
      ctx.scale(1, eyeOpen);
      ctx.beginPath(); ctx.ellipse(0, 0, 5, 6.5, 0, 0, TAU); ctx.fill();
      // sparkle
      ctx.fillStyle = '#fff';
      ctx.beginPath(); ctx.arc(1.6, -2, 2, 0, TAU); ctx.fill();
      ctx.fillStyle = '#3a2e4a';
    }
    ctx.restore();
  }

  // nose
  ctx.fillStyle = '#5a3a2a';
  ctx.beginPath(); ctx.ellipse(0, -8, 3.5, 2.6, 0, 0, TAU); ctx.fill();

  // mouth
  ctx.strokeStyle = '#5a3a2a'; ctx.lineWidth = 2; ctx.lineCap = 'round';
  ctx.beginPath();
  if (celebrate || poppu.mood === 'excited') {
    // open happy mouth
    ctx.moveTo(-6, -3); ctx.quadraticCurveTo(0, 6, 6, -3);
    ctx.stroke();
    ctx.fillStyle = '#ff8f9f';
    ctx.beginPath();
    ctx.moveTo(-5, -2); ctx.quadraticCurveTo(0, 5, 5, -2); ctx.quadraticCurveTo(0, 2, -5, -2);
    ctx.fill();
  } else {
    ctx.moveTo(-4, -4); ctx.quadraticCurveTo(0, -1, 4, -4);
    ctx.stroke();
  }

  ctx.restore();
}

/* ============================================================================
   SCENES / BACKGROUNDS
   ========================================================================== */
const SCENES = [
  { name: 'Meadow', build: buildMeadow, bg: drawMeadowBG, sky: ['#bdeafc', '#d9f7e8', '#f4ffde'] },
  { name: 'Sky',    build: buildSky,    bg: drawSkyBG,    sky: ['#8fd0ff', '#bfe4ff', '#e6f5ff'] },
  { name: 'Magic',  build: buildMagic,  bg: drawMagicBG,  sky: ['#5b3a8c', '#8a5abf', '#c98fd6'] }
];
let sceneIndex = 0;
let objects = [];
let totalTarget = 0;        // objects that must clear
let clearedCount = 0;
let sceneState = 'playing'; // playing | celebrating | transition
let celebrateT = 0;
let transT = 0;
let bgClouds = [];
let bgStars = [];
let flowers = [];
let rainbowReveal = 0;

function initBGDecor() {
  bgClouds = [];
  for (let i = 0; i < 5; i++) {
    bgClouds.push({ x: rand(0, W), y: rand(H * 0.08, H * 0.4), s: rand(0.6, 1.4), sp: rand(3, 9) });
  }
  bgStars = [];
  for (let i = 0; i < 70; i++) {
    bgStars.push({ x: rand(0, W), y: rand(0, H), r: rand(0.6, 2.4), tw: rand(0, TAU), sp: rand(1, 3) });
  }
  flowers = [];
  for (let i = 0; i < 14; i++) {
    flowers.push({ x: rand(0, W), y: H - rand(4, 40), c: pick(['#ff8fb8','#ffd166','#c39bff','#fff']), s: rand(0.6, 1.2) });
  }
}

function loadScene(i) {
  sceneIndex = ((i % SCENES.length) + SCENES.length) % SCENES.length;
  objects = [];
  particles.length = 0;
  trail.length = 0;
  clearedCount = 0;
  rainbowReveal = 0;
  sceneState = 'playing';
  celebrateT = 0;
  initBGDecor();
  SCENES[sceneIndex].build();
  totalTarget = objects.filter(o => o.counts).length;
}

/* ---- scene builders ---- */
function buildMeadow() {
  const n = Math.min(7, Math.max(5, Math.round(W / 200)));
  for (let i = 0; i < n; i++) {
    const o = new Obj('dandelion', rand(W * 0.12, W * 0.88), rand(H * 0.35, H * 0.75));
    o.counts = true; objects.push(o);
  }
  for (let i = 0; i < 4; i++) {
    const o = new Obj('butterfly', rand(W * 0.1, W * 0.9), rand(H * 0.2, H * 0.6));
    o.counts = false; objects.push(o);
  }
  for (let i = 0; i < 10; i++) {
    const o = new Obj('pollen', rand(0, W), rand(H * 0.2, H * 0.85));
    o.counts = false; objects.push(o);
  }
}
function buildSky() {
  const n = Math.min(7, Math.max(5, Math.round(W / 210)));
  for (let i = 0; i < n; i++) {
    const o = new Obj('balloon', rand(W * 0.12, W * 0.88), rand(H * 0.4, H * 0.8));
    o.counts = true; objects.push(o);
  }
  for (let i = 0; i < 3; i++) {
    const o = new Obj('cloud', rand(W * 0.15, W * 0.85), rand(H * 0.15, H * 0.45));
    o.counts = true; objects.push(o);
  }
  for (let i = 0; i < 5; i++) {
    const o = new Obj('feather', rand(W * 0.1, W * 0.9), rand(H * 0.3, H * 0.7));
    o.counts = false; objects.push(o);
  }
  for (let i = 0; i < 6; i++) {
    const o = new Obj('bubble', rand(W * 0.1, W * 0.9), rand(H * 0.5, H * 0.9));
    o.counts = false; objects.push(o);
  }
}
function buildMagic() {
  const n = Math.min(7, Math.max(5, Math.round(W / 220)));
  for (let i = 0; i < n; i++) {
    const o = new Obj('orb', rand(W * 0.12, W * 0.88), rand(H * 0.3, H * 0.75));
    o.counts = true; objects.push(o);
  }
  for (let i = 0; i < 5; i++) {
    const o = new Obj('wisp', rand(W * 0.1, W * 0.9), rand(H * 0.35, H * 0.8));
    o.counts = true; objects.push(o);
  }
}

/* ---- backgrounds ---- */
function drawSkyGradient(colors) {
  const g = ctx.createLinearGradient(0, 0, 0, H);
  colors.forEach((c, i) => g.addColorStop(i / (colors.length - 1), c));
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, W, H);
}

function drawSoftCloud(x, y, s) {
  ctx.save(); ctx.translate(x, y); ctx.scale(s, s);
  ctx.fillStyle = 'rgba(255,255,255,0.85)';
  const puffs = [[-30,4,20],[-8,-6,26],[18,2,22],[36,6,17],[4,10,24]];
  for (const [px,py,r] of puffs) { ctx.beginPath(); ctx.arc(px,py,r,0,TAU); ctx.fill(); }
  ctx.restore();
}

function drawMeadowBG(dt) {
  drawSkyGradient(SCENES[0].sky);
  // sun glow
  ctx.save();
  const sg = ctx.createRadialGradient(W*0.8, H*0.16, 10, W*0.8, H*0.16, 160);
  sg.addColorStop(0, 'rgba(255,250,200,0.9)');
  sg.addColorStop(1, 'rgba(255,250,200,0)');
  ctx.fillStyle = sg; ctx.beginPath(); ctx.arc(W*0.8, H*0.16, 160, 0, TAU); ctx.fill();
  ctx.fillStyle = '#fff6c8'; ctx.beginPath(); ctx.arc(W*0.8, H*0.16, 44, 0, TAU); ctx.fill();
  ctx.restore();
  // drifting clouds
  for (const c of bgClouds) {
    c.x += c.sp * dt;
    if (c.x > W + 80) c.x = -80;
    ctx.globalAlpha = 0.75;
    drawSoftCloud(c.x, c.y, c.s * 0.9);
    ctx.globalAlpha = 1;
  }
  // rolling hills
  drawHill(H * 0.78, '#a8e6a0', 0);
  drawHill(H * 0.86, '#8fdc86', 30);
  drawHill(H * 0.93, '#7ace73', 60);
  // grass + flowers
  drawGrass();
}
function drawHill(y, color, phase) {
  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.moveTo(0, y);
  for (let x = 0; x <= W; x += 40) {
    ctx.lineTo(x, y + Math.sin((x + phase) * 0.004) * 22);
  }
  ctx.lineTo(W, H); ctx.lineTo(0, H); ctx.closePath(); ctx.fill();
}
function drawGrass() {
  ctx.fillStyle = '#6fc266';
  ctx.fillRect(0, H - 18, W, 18);
  for (const f of flowers) {
    ctx.save(); ctx.translate(f.x, f.y); ctx.scale(f.s, f.s);
    ctx.strokeStyle = '#5aa84f'; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(0, 16); ctx.stroke();
    ctx.fillStyle = f.c;
    for (let k = 0; k < 5; k++) {
      const a = (k / 5) * TAU;
      ctx.beginPath(); ctx.arc(Math.cos(a) * 4, Math.sin(a) * 4, 3.2, 0, TAU); ctx.fill();
    }
    ctx.fillStyle = '#ffe08a';
    ctx.beginPath(); ctx.arc(0, 0, 2.4, 0, TAU); ctx.fill();
    ctx.restore();
  }
}

function drawSkyBG(dt) {
  drawSkyGradient(SCENES[1].sky);
  // reveal sun/rainbow behind pushed clouds
  if (rainbowReveal > 0.01) {
    ctx.save();
    ctx.globalAlpha = clamp(rainbowReveal, 0, 1);
    const cx = W * 0.5, cy = H * 0.9;
    const bands = ['#ff6b8f','#ffb26b','#ffe66b','#8fe08f','#6bc6ff','#c39bff'];
    for (let i = 0; i < bands.length; i++) {
      ctx.strokeStyle = bands[i]; ctx.lineWidth = 16;
      ctx.beginPath();
      ctx.arc(cx, cy, Math.min(W,H) * 0.5 - i * 16, Math.PI, TAU);
      ctx.stroke();
    }
    ctx.restore();
  }
  for (const c of bgClouds) {
    c.x += c.sp * dt;
    if (c.x > W + 80) c.x = -80;
    ctx.globalAlpha = 0.55;
    drawSoftCloud(c.x, c.y, c.s);
    ctx.globalAlpha = 1;
  }
}

function drawMagicBG(dt) {
  drawSkyGradient(SCENES[2].sky);
  // twinkling stars
  for (const st of bgStars) {
    st.tw += st.sp * dt;
    const a = 0.4 + Math.abs(Math.sin(st.tw)) * 0.6;
    ctx.globalAlpha = a;
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(st.x, st.y, st.r, 0, TAU); ctx.fill();
    if (st.r > 1.8) {
      ctx.globalAlpha = a * 0.5;
      drawStar(st.x, st.y, st.r * 2.5, 'rgba(255,255,255,0.7)', 4);
    }
  }
  ctx.globalAlpha = 1;
  // aurora ribbons
  ctx.save();
  ctx.globalAlpha = 0.18;
  for (let k = 0; k < 3; k++) {
    const hue = [290, 200, 330][k];
    ctx.strokeStyle = `hsl(${hue}, 80%, 70%)`;
    ctx.lineWidth = 40; ctx.lineCap = 'round';
    ctx.beginPath();
    for (let x = -50; x <= W + 50; x += 30) {
      const y = H * (0.25 + k * 0.12) + Math.sin(x * 0.006 + poppu.t * 0.5 + k) * 40;
      if (x === -50) ctx.moveTo(x, y); else ctx.lineTo(x, y);
    }
    ctx.stroke();
  }
  ctx.restore();
  // distant glow floor
  const fg = ctx.createLinearGradient(0, H * 0.7, 0, H);
  fg.addColorStop(0, 'rgba(200,140,220,0)');
  fg.addColorStop(1, 'rgba(255,200,240,0.3)');
  ctx.fillStyle = fg; ctx.fillRect(0, H * 0.7, W, H * 0.3);
}

/* ============================================================================
   WIND APPLICATION TO OBJECTS
   ========================================================================== */
function applyWindToObjects(dt) {
  if (trail.length === 0) return;
  // use recent trail points as wind sources
  const start = Math.max(0, trail.length - 14);
  for (const o of objects) {
    if (o.gone) continue;
    for (let i = start; i < trail.length; i++) {
      const t = trail[i];
      const radius = 120 + t.r * 120;
      const d2 = dist2(t.x, t.y, o.x, o.y);
      if (d2 < radius * radius) {
        const d = Math.sqrt(d2) || 1;
        const falloff = (1 - d / radius);
        const power = falloff * t.r * t.life * 1.4;
        // force direction: pointer velocity + slight push away from point
        const nx = (o.x - t.x) / d, ny = (o.y - t.y) / d;
        const fx = t.vx * 0.35 + nx * 120;
        const fy = t.vy * 0.35 + ny * 120;
        o.applyWind(fx, fy, power * dt * 3);
      }
    }
  }
}

/* ============================================================================
   CLEARING / CELEBRATION
   ========================================================================== */
function onObjectCleared(o) {
  // sparkle poof where it left
  const cx = clamp(o.x, 0, W), cy = clamp(o.y, 0, H);
  const col = o.color || '#fff';
  burst(cx, cy, typeof col === 'string' && col[0] === '#' ? col : '#fff', 10,
        { min: 40, max: 180, twinkle: true, rMin: 3, rMax: 7, grav: 30 });
  poppuReact(0.6);
  if (o.counts) {
    clearedCount++;
    Audio.sfx.giggle();
    checkSceneClear();
  }
  o.alive = false;
}

function checkSceneClear() {
  if (sceneState !== 'playing') return;
  if (clearedCount >= totalTarget && totalTarget > 0) {
    startCelebration();
  }
}

function startCelebration() {
  sceneState = 'celebrating';
  celebrateT = 0;
  nextFirework = 0.15;
  poppuCelebrate();
  Audio.sfx.celebrate();
  showHint('🎉 Yay! Great job!');
  // opening pop from center + first confetti burst
  spawnFirework(W * 0.5, H * 0.42);
  spawnConfettiRain(30);
}

const CONFETTI_COLORS = ['#ff8fb8','#ffd166','#8ec5ff','#a0e6a0','#c39bff','#ff9e6b','#7ee0d0','#ffffff'];
let nextFirework = 0;
const CELEBRATE_DUR = 3.0;

function spawnConfettiRain(n) {
  for (let i = 0; i < n; i++) {
    addParticle({
      type: 'confetti',
      x: rand(-20, W + 20), y: rand(-40, -10),
      vx: rand(-40, 40), vy: rand(120, 240),
      life: 1, decay: rand(0.28, 0.42),
      r: rand(4, 8), color: pick(CONFETTI_COLORS),
      grav: 60, airDrag: 0.995, sway: rand(20, 60),
      rot: rand(0, TAU), spin: rand(-9, 9)
    });
  }
}
function spawnFirework(x, y) {
  const hue = rand(0, 360);
  const n = randi(16, 24);
  for (let i = 0; i < n; i++) {
    const a = (i / n) * TAU + rand(-0.1, 0.1);
    const sp = rand(160, 340);
    addParticle({
      type: Math.random() < 0.5 ? 'star' : 'spark',
      x, y, vx: Math.cos(a) * sp, vy: Math.sin(a) * sp,
      life: 1, decay: rand(0.7, 1.3),
      r: rand(3, 7), color: `hsl(${(hue + rand(-25,25))|0},95%,72%)`,
      grav: 40, airDrag: 0.93, twinkle: true,
      rot: rand(0, TAU), spin: rand(-7, 7)
    });
  }
  // bright core flash
  addParticle({ type: 'spark', x, y, vx: 0, vy: 0, life: 1, decay: 2.4,
    r: 26, color: 'rgba(255,255,255,0.95)', grav: 0, airDrag: 0.9 });
  Audio.chime(rand(520, 720), [0, 4, 7, 12], 0.1);
}

function updateCelebration(dt) {
  celebrateT += dt;
  const t = celebrateT;

  // continuous confetti rain (eases off near the end)
  if (t < CELEBRATE_DUR - 0.4) spawnConfettiRain(t < 0.6 ? 8 : 4);

  // periodic fireworks in the upper area
  nextFirework -= dt;
  if (nextFirework <= 0 && t < CELEBRATE_DUR - 0.6) {
    nextFirework = rand(0.22, 0.42);
    spawnFirework(rand(W * 0.15, W * 0.85), rand(H * 0.15, H * 0.5));
  }

  // sparkle fountain from Poppu (he's dancing)
  if (Math.random() < 0.7) {
    burst(poppu.x, poppu.y - poppu.size * 0.5, `hsl(${rand(35,60)},100%,78%)`, 4,
          { min: 120, max: 300, up: 120, twinkle: true, rMin: 3, rMax: 6, grav: 120 });
  }

  if (t > CELEBRATE_DUR) {
    sceneState = 'transition';
    transT = 0;
  }
}

/* ============================================================================
   MAIN LOOP
   ========================================================================== */
let started = false;
let last = performance.now();
let idleTimer = 0;

function frame(now) {
  let dt = (now - last) / 1000;
  last = now;
  dt = Math.min(dt, 0.05);

  // --- update ---
  if (started) {
    updatePointer(dt);
    updatePoppu(dt);

    if (sceneState === 'playing') {
      applyWindToObjects(dt);
      idleTimer += dt;
      if (pointer.down) idleTimer = 0;
    }

    // reveal rainbow in sky scene based on cloud movement
    if (sceneIndex === 1) {
      let cloudMove = 0, clouds = 0;
      for (const o of objects) if (o.kind === 'cloud') { clouds++; cloudMove += o.reveal || 0; }
      if (clouds) rainbowReveal = lerp(rainbowReveal, cloudMove / clouds, 0.05);
    }

    for (const o of objects) if (!o.gone) o.update(dt);
    updateParticles(dt);

    if (sceneState === 'celebrating') updateCelebration(dt);
    if (sceneState === 'transition') {
      transT += dt;
      if (transT > 1.2) {
        loadScene(sceneIndex + 1);
        hideHint();
      }
    }
  }

  // --- draw ---
  ctx.clearRect(0, 0, W, H);
  SCENES[sceneIndex].bg(dt);

  // objects sorted so heavy/background ones draw first
  const sorted = objects.filter(o => !o.gone).sort((a, b) => (a.mass) - (b.mass));
  for (const o of sorted) o.draw();

  drawWindTrail();
  drawParticles();
  drawParticlesExt();

  if (started) drawPoppu();

  // scene name pill + progress dots
  if (started) drawHUD();

  // transition fade
  if (sceneState === 'transition') {
    ctx.globalAlpha = clamp(transT / 1.2, 0, 1) * (transT < 0.6 ? transT/0.6 : (1.2-transT)/0.6);
    ctx.fillStyle = '#fff';
    ctx.fillRect(0, 0, W, H);
    ctx.globalAlpha = 1;
  }

  // idle hint
  if (started && sceneState === 'playing' && idleTimer > 4 && !pointer.down) {
    showHint('✋ Drag to make wind!');
  }

  requestAnimationFrame(frame);
}

function drawWindTrail() {
  if (trail.length < 2) return;
  ctx.save();
  ctx.lineCap = 'round'; ctx.lineJoin = 'round';
  // glow underlay
  for (let pass = 0; pass < 2; pass++) {
    ctx.beginPath();
    for (let i = 1; i < trail.length; i++) {
      const a = trail[i - 1], b = trail[i];
      ctx.moveTo(a.x, a.y);
      ctx.lineTo(b.x, b.y);
    }
    ctx.strokeStyle = pass === 0 ? 'rgba(200,240,255,0.25)' : 'rgba(255,255,255,0.6)';
    ctx.lineWidth = pass === 0 ? 26 : 10;
    ctx.globalAlpha = 0.6;
    ctx.stroke();
  }
  // per-seg alpha tips
  for (let i = 1; i < trail.length; i++) {
    const a = trail[i - 1], b = trail[i];
    ctx.globalAlpha = b.life * 0.5;
    ctx.strokeStyle = 'rgba(255,255,255,0.9)';
    ctx.lineWidth = b.r * 8;
    ctx.beginPath(); ctx.moveTo(a.x, a.y); ctx.lineTo(b.x, b.y); ctx.stroke();
  }
  ctx.restore();
  ctx.globalAlpha = 1;
}

function drawHUD() {
  // progress dots top-center
  const total = totalTarget;
  if (total <= 0) return;
  const done = clamp(clearedCount, 0, total);
  const r = 7, gap = 20;
  const wtot = total * gap;
  let x = W / 2 - wtot / 2 + gap / 2;
  const y = 30;
  // scene label
  ctx.save();
  ctx.font = 'bold 16px "Trebuchet MS", sans-serif';
  ctx.textAlign = 'center';
  ctx.fillStyle = 'rgba(255,255,255,0.85)';
  const label = SCENES[sceneIndex].name;
  const tw = ctx.measureText(label).width + 26;
  ctx.fillStyle = 'rgba(0,0,0,0.12)';
  roundRect(ctx, W/2 - tw/2, 46, tw, 26, 13); ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.fillText(label, W/2, 64);
  ctx.restore();

  for (let i = 0; i < total; i++) {
    ctx.beginPath();
    ctx.arc(x, y, r, 0, TAU);
    if (i < done) {
      ctx.fillStyle = '#ffe08a';
      ctx.fill();
      ctx.strokeStyle = 'rgba(255,255,255,0.9)'; ctx.lineWidth = 2; ctx.stroke();
    } else {
      ctx.fillStyle = 'rgba(255,255,255,0.35)';
      ctx.fill();
    }
    x += gap;
  }
}

/* ---- hint UI ---- */
const hintEl = document.getElementById('hint');
let hintTimer = null;
function showHint(text) {
  hintEl.textContent = text;
  hintEl.classList.add('show');
  clearTimeout(hintTimer);
  hintTimer = setTimeout(hideHint, 3000);
  idleTimer = 0;
}
function hideHint() { hintEl.classList.remove('show'); }

/* ============================================================================
   START
   ========================================================================== */
const startEl = document.getElementById('start');
function begin() {
  if (started) return;
  started = true;
  Audio.init(); Audio.resume();
  startEl.classList.add('hide');
  loadScene(0);
  setTimeout(() => showHint('✋ Drag to make wind!'), 600);
}
startEl.addEventListener('click', begin);
startEl.addEventListener('touchstart', function (e) { e.preventDefault(); begin(); }, { passive: false });

// keep audio alive on visibility
document.addEventListener('visibilitychange', () => { if (!document.hidden) Audio.resume(); });

// pre-build first scene invisibly so it's ready
loadScene(0);
started = false;

requestAnimationFrame(frame);

})();
</script>
</body>
</html>
