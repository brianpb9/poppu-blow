<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#bfe6f5">
<title>Poppu Blow</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    width: 100%; height: 100%; overflow: hidden;
    background: #bfe6f5;
    font-family: 'Trebuchet MS', 'Segoe UI', system-ui, sans-serif;
    touch-action: none; user-select: none; -webkit-user-select: none;
    overscroll-behavior: none; position: fixed;
  }
  #game { display: block; width: 100vw; height: 100vh; touch-action: none; }
  #hint {
    position: fixed; left: 50%; bottom: 26px; transform: translateX(-50%); z-index: 5;
    color: #6b5a8a; font-size: clamp(13px, 4vw, 18px); font-weight: bold;
    background: rgba(255,255,255,.62); padding: 9px 20px; border-radius: 40px;
    pointer-events: none; opacity: 0; transition: opacity .5s; backdrop-filter: blur(3px);
    white-space: nowrap;
  }
  #hint.show { opacity: 1; }
</style>
</head>
<body>
<canvas id="game"></canvas>
<div id="hint">✋ Drag to make wind!</div>

<script>
"use strict";
(function () {
/* ============================================================================
   POPPU BLOW — a toddler wind game (v4)
   Single file, vanilla JS, Canvas 2D, Web Audio. No dependencies.
   8 levels · star collection · sticker book · level-select map.
   ========================================================================== */

const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

let W = 0, H = 0, DPR = 1;
function resize() {
  DPR = Math.min(window.devicePixelRatio || 1, 2.5);
  W = window.innerWidth; H = window.innerHeight;
  canvas.width = Math.floor(W * DPR);
  canvas.height = Math.floor(H * DPR);
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
}
window.addEventListener('resize', resize);
resize();

/* ---- helpers ---------------------------------------------------------- */
const TAU = Math.PI * 2;
const rand = (a, b) => a + Math.random() * (b - a);
const randi = (a, b) => Math.floor(rand(a, b + 1));
const pick = arr => arr[(Math.random() * arr.length) | 0];
const clamp = (v, a, b) => v < a ? a : v > b ? b : v;
const lerp = (a, b, t) => a + (b - a) * t;
const dist2 = (x1, y1, x2, y2) => { const dx = x2 - x1, dy = y2 - y1; return dx * dx + dy * dy; };
function roundRect(c, x, y, w, h, r) {
  c.beginPath();
  c.moveTo(x + r, y);
  c.arcTo(x + w, y, x + w, y + h, r);
  c.arcTo(x + w, y + h, x, y + h, r);
  c.arcTo(x, y + h, x, y, r);
  c.arcTo(x, y, x + w, y, r);
  c.closePath();
}
function easeOutBack(t) {
  const c1 = 1.70158, c3 = c1 + 1;
  return 1 + c3 * Math.pow(t - 1, 3) + c1 * Math.pow(t - 1, 2);
}

/* ============================================================================
   PRODUCTION ART ASSETS — real illustrated PNGs (gpt_image_2), clean alpha.
   ========================================================================== */
const IMG = {};
// Only assets that exist on disk are loaded here. Anything else (poppu-guide,
// stickers, badges, gift, unmade backgrounds) has a runtime fallback in code.
const IMG_NAMES = [
  'poppu-idle', 'poppu-excited', 'poppu-celebrate',
  'dandelion-full', 'dandelion-seed',
  'butterfly-pink', 'butterfly-yellow', 'butterfly-purple', 'flower-set',
  'balloon-red', 'balloon-blue', 'balloon-yellow', 'balloon-pink',
  'cloud-puffy', 'feather-white', 'feather-white-v2', 'bubble',
  'magic-orb-purple', 'magic-orb-cyan', 'magic-orb-gold',
  'tulip', 'ladybug', 'starfish', 'seashell', 'seagull', 'acorn',
  'mushroom', 'firefly', 'jellyfish', 'fish', 'star-pickup',
  'bg-meadow', 'bg-sky', 'bg-magic', 'bg-party'
];
for (const n of IMG_NAMES) { const im = new Image(); im.src = 'assets/' + n + '.png'; IMG[n] = im; }
function imgReady(name) { const i = IMG[name]; return !!(i && i.complete && i.naturalWidth > 0); }

// Draw a sprite centered on the current transform origin.
function drawImg(name, dispH, yOff) {
  const im = IMG[name];
  if (!im || !im.complete || !im.naturalWidth) return false;
  const w = dispH * (im.naturalWidth / im.naturalHeight);
  ctx.drawImage(im, -w / 2, -dispH / 2 + (yOff || 0), w, dispH);
  return true;
}
// Draw a sprite, falling back to a second asset if the first isn't loaded.
function drawImgFallback(nameA, nameB, dispH, yOff) {
  if (drawImg(nameA, dispH, yOff)) return true;
  return drawImg(nameB, dispH, yOff);
}
// Full-screen background image, scaled to COVER.
function drawBGCover(name) {
  const im = IMG[name];
  if (!im || !im.complete || !im.naturalWidth) { return false; }
  const ir = im.naturalWidth / im.naturalHeight, sr = W / H;
  let w, h;
  if (sr > ir) { w = W; h = W / ir; } else { h = H; w = H * ir; }
  ctx.drawImage(im, (W - w) / 2, (H - h) / 2, w, h);
  return true;
}

/* ============================================================================
   PROGRESS — localStorage (stars, completed levels, stickers)
   ========================================================================== */
const Progress = (function () {
  const KEY = 'poppublow_v4';
  let data = { stars: {}, completed: {}, stickers: [], seenTutorial: false };
  try { const s = localStorage.getItem(KEY); if (s) data = Object.assign(data, JSON.parse(s)); } catch (e) {}
  function save() { try { localStorage.setItem(KEY, JSON.stringify(data)); } catch (e) {} }
  return {
    data,
    totalStars() { let t = 0; for (const k in data.stars) t += data.stars[k]; return t; },
    starsFor(lv) { return data.stars[lv] || 0; },              // lv is 1-based
    isCompleted(lv) { return !!data.completed[lv]; },
    isUnlocked(lv) { return lv === 1 || !!data.completed[lv - 1]; },
    completeLevel(lv, stars) {
      data.completed[lv] = true;
      data.stars[lv] = Math.max(data.stars[lv] || 0, stars);
      if (data.stickers.indexOf(lv) < 0) data.stickers.push(lv);
      save();
    },
    hasSticker(id) { return data.stickers.indexOf(id) >= 0; },
    markTutorial() { data.seenTutorial = true; save(); },
    save
  };
})();

/* ============================================================================
   AUDIO — Web Audio API, all synthesized (+ gentle music bed)
   ========================================================================== */
const Audio = (function () {
  let ac = null, master = null, musicGain = null, ready = false;
  let windGain = null, windFilter = null, windSrc = null, windLFO = null;
  let noiseBuf = null;
  let musicOn = false, musicTimer = null, mi = 0;

  function init() {
    if (ac) return;
    try { ac = new (window.AudioContext || window.webkitAudioContext)(); }
    catch (e) { return; }
    master = ac.createGain(); master.gain.value = 0.85; master.connect(ac.destination);
    musicGain = ac.createGain(); musicGain.gain.value = 0.9; musicGain.connect(master);

    const len = ac.sampleRate * 2;
    noiseBuf = ac.createBuffer(1, len, ac.sampleRate);
    const d = noiseBuf.getChannelData(0);
    let b0 = 0, b1 = 0, b2 = 0;
    for (let i = 0; i < len; i++) {
      const white = Math.random() * 2 - 1;
      b0 = 0.99765 * b0 + white * 0.0990460;
      b1 = 0.96300 * b1 + white * 0.2965164;
      b2 = 0.57000 * b2 + white * 1.0526913;
      d[i] = (b0 + b1 + b2 + white * 0.1848) * 0.16;
    }
    windSrc = ac.createBufferSource(); windSrc.buffer = noiseBuf; windSrc.loop = true;
    windFilter = ac.createBiquadFilter(); windFilter.type = 'bandpass'; windFilter.frequency.value = 550; windFilter.Q.value = 0.7;
    windGain = ac.createGain(); windGain.gain.value = 0;
    windLFO = ac.createOscillator(); windLFO.type = 'sine'; windLFO.frequency.value = 0.7;
    const lfoGain = ac.createGain(); lfoGain.gain.value = 180;
    windLFO.connect(lfoGain); lfoGain.connect(windFilter.frequency);
    windSrc.connect(windFilter); windFilter.connect(windGain); windGain.connect(master);
    windSrc.start(); windLFO.start();
    ready = true;
  }
  // Robust unlock: create context + resume on any user gesture (autoplay policy).
  function unlock() { init(); if (ac && ac.state === 'suspended') ac.resume(); }
  function resume() { if (ac && ac.state === 'suspended') ac.resume(); }

  function setWind(intensity) {
    if (!ready) return;
    const t = ac.currentTime;
    windGain.gain.setTargetAtTime(clamp(intensity, 0, 1) * 0.18, t, 0.08);
    windFilter.frequency.setTargetAtTime(400 + intensity * 900, t, 0.12);
  }
  function tone(freq, dur, type, vol, opts) {
    if (!ready) return;
    opts = opts || {};
    const t = ac.currentTime;
    const o = ac.createOscillator(), g = ac.createGain();
    o.type = type || 'sine';
    o.frequency.setValueAtTime(freq, t);
    if (opts.glideTo) o.frequency.exponentialRampToValueAtTime(opts.glideTo, t + dur);
    g.gain.setValueAtTime(0.0001, t);
    g.gain.exponentialRampToValueAtTime(vol, t + (opts.attack || 0.01));
    g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
    o.connect(g);
    const out = opts.music ? musicGain : master;
    if (opts.filter) {
      const f = ac.createBiquadFilter(); f.type = 'lowpass'; f.frequency.value = opts.filter;
      g.connect(f); f.connect(out);
    } else g.connect(out);
    o.start(t); o.stop(t + dur + 0.05);
  }
  function chime(base, steps, vol) {
    if (!ready) return;
    const notes = steps || [0, 4, 7, 12];
    notes.forEach((s, i) => {
      const f = (base || 523) * Math.pow(2, s / 12);
      setTimeout(() => tone(f, 0.5, 'sine', (vol || 0.15), { attack: 0.02, filter: 3500 }), i * 70);
    });
  }

  // ---- gentle background music bed (soft pentatonic bells) ----
  const MSCALE = [0, 2, 4, 7, 9, 12];
  function scheduleMusic() {
    if (!musicOn || !ready) return;
    const root = 392; // G4
    const s = MSCALE[mi % MSCALE.length]; mi++;
    tone(root * Math.pow(2, s / 12), 1.8, 'sine', 0.035, { attack: 0.35, filter: 2200, music: true });
    if (mi % 4 === 0) tone(root * Math.pow(2, (s - 12) / 12), 2.4, 'triangle', 0.03, { attack: 0.5, filter: 900, music: true });
    musicTimer = setTimeout(scheduleMusic, 1150);
  }
  function startMusic() { if (!ready || musicOn) return; musicOn = true; scheduleMusic(); }
  function stopMusic() { musicOn = false; if (musicTimer) clearTimeout(musicTimer); }

  const sfx = {
    seed()   { tone(rand(900,1300), 0.18, 'sine', 0.10, { attack: 0.005, glideTo: rand(1500,2200), filter: 4000 }); },
    balloon(){ tone(rand(300,460), 0.22, 'square', 0.12, { attack: 0.005, glideTo: rand(700,950), filter: 1600 }); },
    butterfly(){ Audio.chime(rand(700,900), [0, 5, 9], 0.07); },
    cloud()  { tone(rand(160,230), 0.5, 'sine', 0.09, { attack: 0.06, filter: 900 }); },
    feather(){ tone(rand(1200,1700), 0.3, 'sine', 0.06, { attack: 0.03, glideTo: rand(600,900), filter: 5000 }); },
    bubble() { tone(rand(500,800), 0.14, 'sine', 0.09, { attack: 0.004, glideTo: rand(1100,1700), filter: 4500 }); },
    pop()    { tone(rand(600,900), 0.09, 'sine', 0.11, { attack: 0.003, glideTo: rand(1300,1900), filter: 5000 }); },
    orb()    { Audio.chime(rand(600,760), [0, 4, 7, 11], 0.09); },
    wisp()   { tone(rand(800,1100), 0.4, 'triangle', 0.07, { attack: 0.04, glideTo: rand(1400,1900), filter: 4000 }); },
    star()   { Audio.chime(rand(700,860), [0, 7, 12, 16], 0.13); },
    giggle() {
      const notes = [0, 3, -2, 5, 2];
      notes.forEach((s, i) => setTimeout(() => tone(660 * Math.pow(2, s/12), 0.16, 'sine', 0.10, { attack: 0.01, filter: 3000 }), i * 90));
    },
    celebrate() {
      Audio.chime(523, [0, 4, 7, 12, 16, 19], 0.16);
      setTimeout(() => Audio.chime(587, [0, 4, 7, 12], 0.13), 300);
    },
    unlock() { Audio.chime(523, [0, 4, 7, 12], 0.12); }
  };
  return { init, unlock, resume, setWind, tone, chime, sfx, startMusic, stopMusic };
})();

/* ============================================================================
   POINTER / WIND INPUT
   ========================================================================== */
const pointer = { x: 0, y: 0, px: 0, py: 0, vx: 0, vy: 0, speed: 0, down: false, active: false, lastT: 0 };
const trail = [];

function updatePointer(dt) {
  const now = performance.now();
  if (pointer.down) {
    const ndt = Math.max(0.001, (now - pointer.lastT) / 1000);
    let nvx = (pointer.x - pointer.px) / ndt;
    let nvy = (pointer.y - pointer.py) / ndt;
    pointer.vx = lerp(pointer.vx, nvx, 0.5);
    pointer.vy = lerp(pointer.vy, nvy, 0.5);
    pointer.speed = Math.hypot(pointer.vx, pointer.vy);
    pointer.px = pointer.x; pointer.py = pointer.y; pointer.lastT = now;
    if (pointer.speed > 40) {
      trail.push({ x: pointer.x, y: pointer.y, vx: pointer.vx, vy: pointer.vy,
                   life: 1, r: clamp(pointer.speed / 900, 0.35, 1) });
      spawnWindParticles();
    }
  } else {
    pointer.speed = lerp(pointer.speed, 0, 0.2);
    pointer.vx = lerp(pointer.vx, 0, 0.2);
    pointer.vy = lerp(pointer.vy, 0, 0.2);
  }
  Audio.setWind(clamp(pointer.speed / 1400, 0, 1) * (pointer.down ? 1 : 0.15));
  for (let i = trail.length - 1; i >= 0; i--) {
    trail[i].life -= dt * 1.7;
    if (trail[i].life <= 0) trail.splice(i, 1);
  }
  if (trail.length > 90) trail.splice(0, trail.length - 90);
}

/* ============================================================================
   PARTICLES
   ========================================================================== */
const particles = [];
function addParticle(p) { particles.push(p); }

function spawnWindParticles() {
  const n = clamp((pointer.speed / 500) | 0, 1, 3);
  for (let i = 0; i < n; i++) {
    const a = Math.atan2(pointer.vy, pointer.vx) + rand(-0.4, 0.4);
    const sp = pointer.speed * rand(0.15, 0.4);
    addParticle({ type: 'wind', x: pointer.x + rand(-14, 14), y: pointer.y + rand(-14, 14),
      vx: Math.cos(a) * sp, vy: Math.sin(a) * sp, life: 1, decay: rand(1.4, 2.4), r: rand(5, 13),
      hue: 190 + rand(-20, 30) });
  }
}
function burst(x, y, color, count, opts) {
  opts = opts || {};
  for (let i = 0; i < count; i++) {
    const a = rand(0, TAU);
    const sp = rand(opts.min || 60, opts.max || 260);
    addParticle({ type: opts.type || 'spark', x, y,
      vx: Math.cos(a) * sp, vy: Math.sin(a) * sp - (opts.up || 0),
      life: 1, decay: rand(0.8, 1.7), r: rand(opts.rMin || 3, opts.rMax || 8),
      color: color, grav: opts.grav != null ? opts.grav : 40,
      spin: rand(-8, 8), rot: rand(0, TAU), twinkle: opts.twinkle });
  }
}
function updateParticles(dt) {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.life -= dt * p.decay;
    if (p.life <= 0) { particles.splice(i, 1); continue; }
    p.x += p.vx * dt; p.y += p.vy * dt;
    if (p.grav) p.vy += p.grav * dt;
    const dr = p.airDrag != null ? p.airDrag : 0.98;
    p.vx *= dr; p.vy *= dr;
    if (p.spin) p.rot += p.spin * dt;
    if (p.sway) p.x += Math.sin((p.rot || 0) + p.life * 6) * p.sway * dt;
  }
  if (particles.length > 600) particles.splice(0, particles.length - 600);
}
function drawParticles() {
  for (const p of particles) {
    const a = clamp(p.life, 0, 1);
    if (p.type === 'wind') {
      ctx.globalAlpha = a * 0.5;
      ctx.fillStyle = `hsl(${p.hue}, 80%, 88%)`;
      ctx.beginPath(); ctx.arc(p.x, p.y, p.r * (0.5 + a * 0.7), 0, TAU); ctx.fill();
    } else if (p.type === 'confetti') {
      ctx.save(); ctx.globalAlpha = a; ctx.translate(p.x, p.y); ctx.rotate(p.rot);
      ctx.fillStyle = p.color;
      const w = p.r * 1.6, h = p.r * 2.4 * (0.5 + 0.5 * Math.abs(Math.cos(p.rot * 1.3)));
      roundRect(ctx, -w / 2, -h / 2, w, h, 2); ctx.fill(); ctx.restore();
    } else if (p.type === 'star' || p.twinkle) {
      ctx.save(); ctx.globalAlpha = a; ctx.translate(p.x, p.y); ctx.rotate(p.rot);
      drawStar(0, 0, p.r * (0.6 + a * 0.6), p.color); ctx.restore();
    } else {
      ctx.globalAlpha = a;
      const g = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.r);
      g.addColorStop(0, p.color); g.addColorStop(1, 'rgba(255,255,255,0)');
      ctx.fillStyle = g; ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, TAU); ctx.fill();
    }
  }
  ctx.globalAlpha = 1;
}
function drawParticlesExt() {
  for (const p of particles) {
    if (p.render !== 'seed') continue;
    const a = clamp(p.life, 0, 1);
    ctx.save(); ctx.globalAlpha = a; ctx.translate(p.x, p.y); ctx.rotate(p.rot || 0);
    drawImg('dandelion-seed', (p.r + 3) * 2.8);
    ctx.restore();
  }
  ctx.globalAlpha = 1;
}
function drawStar(x, y, r, color, points) {
  points = points || 5;
  ctx.beginPath();
  for (let i = 0; i < points * 2; i++) {
    const rr = i % 2 === 0 ? r : r * 0.45;
    const a = (i / (points * 2)) * TAU - Math.PI / 2;
    const px = x + Math.cos(a) * rr, py = y + Math.sin(a) * rr;
    if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
  }
  ctx.closePath(); ctx.fillStyle = color; ctx.fill();
}

/* ============================================================================
   OBJECTS
   ========================================================================== */
class Obj {
  constructor(kind, x, y) {
    this.kind = kind; this.x = x; this.y = y;
    this.vx = 0; this.vy = 0;
    this.rot = rand(0, TAU); this.vr = rand(-0.4, 0.4);
    this.wob = rand(0, TAU); this.scale = 1;
    this.gone = false; this.alive = true;
    this.spawnAnim = 0; this.hit = 0;
    this.counts = false; this.isStar = false;
    kindConfig[kind].init(this);
  }
  applyWind(fx, fy, power) {
    const inv = 1 / this.mass;
    this.vx += fx * inv * power;
    this.vy += fy * inv * power;
    this.hit = Math.min(1, this.hit + power * 0.5);
    kindConfig[this.kind].onWind(this, power);
  }
  update(dt) {
    if (this.spawnAnim < 1) this.spawnAnim = Math.min(1, this.spawnAnim + dt * 2.2);
    this.wob += dt * this.wobSpeed;
    kindConfig[this.kind].update(this, dt);
    const L = LEVELS[currentLevel];
    if (L && L.floaty && !this.isStar) this.vy -= 4 * dt;   // dreamy underwater lift
    this.x += this.vx * dt; this.y += this.vy * dt;
    this.rot += this.vr * dt;
    this.vx *= this.drag; this.vy *= this.drag;
    this.hit *= 0.9;
    const m = this.size * 1.5;
    if (this.x < -m || this.x > W + m || this.y < -m || this.y > H + m) {
      if (!this.gone) { this.gone = true; onObjectCleared(this); }
    }
  }
  draw() {
    const s = this.scale * (0.3 + 0.7 * easeOutBack(this.spawnAnim));
    ctx.save();
    ctx.translate(this.x, this.y); ctx.scale(s, s); ctx.rotate(this.rot);
    kindConfig[this.kind].draw(this);
    ctx.restore();
  }
}

/* ---- reusable object archetypes -------------------------------------- */
// A blowable object that rests/slides (flowers, shells, acorns, gifts).
function blowable(opts) {
  return {
    init(o) {
      o.mass = opts.mass; o.drag = opts.drag || 0.91;
      o.wobSpeed = opts.wobSpeed || 1.5; o.size = opts.size || 44;
      o.imgName = opts.img; o.rot = rand(-0.12, 0.12); o.vr = 0;
      if (opts.init) opts.init(o);
    },
    onWind(o, power) {
      if (opts.tumble) o.vr += (Math.random() - 0.5) * power * opts.tumble;
      if (power > 0.35 && opts.sfx && Math.random() < 0.2) Audio.sfx[opts.sfx]();
    },
    update(o, dt) {
      o.vx += Math.sin(o.wob) * (opts.sway != null ? opts.sway : 2) * dt;
      if (opts.upright) o.rot = Math.sin(o.wob) * 0.1;
      if (opts.update) opts.update(o, dt);
    },
    draw(o) { drawImg(opts.img, opts.dispH || 100, opts.yOff || 0); },
    cleared() { return false; }
  };
}
// A fluttering creature (butterflies, birds, fish, fireflies, ladybugs).
function flutter(opts) {
  return {
    init(o) {
      o.mass = opts.mass; o.drag = opts.drag || 0.92;
      o.wobSpeed = opts.wobSpeed || 8; o.size = opts.size || 34;
      o.imgName = opts.img; o.flap = 0; o.fear = 0;
      if (opts.init) opts.init(o);
    },
    onWind(o, power) {
      o.fear = Math.min(1, o.fear + power);
      o.vy -= power * (opts.lift != null ? opts.lift : 26);
      if (power > 0.4 && opts.sfx && Math.random() < 0.15) Audio.sfx[opts.sfx]();
    },
    update(o, dt) {
      o.flap += dt * (12 + o.fear * 24);
      o.vx += Math.cos(o.wob * 0.7) * ((opts.wander || 18) + o.fear * 40) * dt;
      o.vy += Math.sin(o.wob) * (opts.vwander || 12) * dt - (opts.rise || 4) * dt;
      o.fear *= 0.96;
      o.rot = clamp(o.vx * 0.001, -0.4, 0.4);
      if (opts.glow && Math.random() < 0.3) {
        addParticle({ type: 'spark', x: o.x + rand(-8,8), y: o.y + rand(-8,8),
          vx: rand(-10,10), vy: rand(-10,10), life: 1, decay: 1.8, r: rand(3,6),
          color: opts.glow, grav: 0 });
      }
      if (opts.trail && o.fear > 0.2 && Math.random() < 0.3) {

    },
    draw(o) {

      ctx.save(); ctx.scale(flap, 1); drawImg(o.imgName, opts.dispH || 70); ctx.restore();
    },
    cleared() { return false; }
  };
}

// dandelion seed that flies off
function spawnSeedFly(x, y, wvx, wvy) {
  const a = Math.atan2(wvy, wvx) + rand(-0.6, 0.6);
  const sp = Math.hypot(wvx, wvy) * rand(0.4, 0.9) + rand(30, 80);
  addParticle({ type: 'seed', x, y, vx: Math.cos(a) * sp, vy: Math.sin(a) * sp - rand(10, 40),
    life: 1, decay: rand(0.4, 0.7), r: rand(3, 5), color: 'rgba(255,255,255,0.95)',
    grav: -6, spin: rand(-4, 4), rot: rand(0, TAU), render: 'seed' });
}

/* color utils */
function hexToRgb(h) { h = h.replace('#', ''); if (h.length === 3) h = h.split('').map(c => c + c).join(''); const n = parseInt(h, 16); return { r: (n >> 16) & 255, g: (n >> 8) & 255, b: n & 255 }; }
function mixHex(h1, h2, t) { const a = hexToRgb(h1), b = hexToRgb(h2); return `rgb(${Math.round(lerp(a.r,b.r,t))},${Math.round(lerp(a.g,b.g,t))},${Math.round(lerp(a.b,b.b,t))})`; }
function softShadow(color, blur, ox, oy) { ctx.shadowColor = color; ctx.shadowBlur = blur; ctx.shadowOffsetX = ox || 0; ctx.shadowOffsetY = oy || 0; }
function clearShadow() { ctx.shadowColor = 'transparent'; ctx.shadowBlur = 0; ctx.shadowOffsetX = 0; ctx.shadowOffsetY = 0; }

/* ============================================================================
   POPPU MASCOT
   ========================================================================== */
const poppu = { x: 0, y: 0, size: 74, mood: 'idle', bounce: 0, blink: 0, blinkT: rand(2, 5), excite: 0, cheer: 0, t: 0, armWave: 0 };
function updatePoppu(dt) {
  poppu.t += dt;
  poppu.size = clamp(Math.min(W, H) * 0.11, 56, 96);
  const margin = poppu.size * 0.9;
  poppu.x = W - margin; poppu.y = H - margin * 0.85;
  poppu.blinkT -= dt;
  if (poppu.blinkT <= 0) { poppu.blink = 1; poppu.blinkT = rand(2.5, 5.5); }
  if (poppu.blink > 0) poppu.blink = Math.max(0, poppu.blink - dt * 7);
  poppu.excite = Math.max(0, poppu.excite - dt * 0.8);
  poppu.cheer = Math.max(0, poppu.cheer - dt);
  if (poppu.cheer > 0) poppu.mood = 'celebrate';
  else if (poppu.excite > 0.3) poppu.mood = 'excited';
  else poppu.mood = 'idle';
  const speed = poppu.mood === 'celebrate' ? 9 : poppu.mood === 'excited' ? 6 : 2.2;
  poppu.bounce = Math.sin(poppu.t * speed);
  poppu.armWave += dt * (poppu.mood === 'celebrate' ? 16 : poppu.mood === 'excited' ? 9 : 3);
}
function poppuReact(amount) { poppu.excite = Math.min(1.5, poppu.excite + amount); }
function poppuCelebrate() { poppu.cheer = 2.4; }
function drawPoppu() {
  const s = poppu.size / 74;
  const by = poppu.bounce * (poppu.mood === 'celebrate' ? 14 : poppu.mood === 'excited' ? 8 : 3);
  const breathe = poppu.mood === 'idle' ? 1 + Math.sin(poppu.t * 2.2) * 0.03 : 1;
  ctx.save();
  ctx.translate(poppu.x, poppu.y + by); ctx.scale(s, s);
  ctx.globalAlpha = 0.16; ctx.fillStyle = '#3a3a5a';
  ctx.beginPath(); ctx.ellipse(0, 46 - by * 0.4, 42, 10, 0, 0, TAU); ctx.fill();
  ctx.globalAlpha = 1;
  const squash = poppu.mood === 'celebrate' ? 1 + poppu.bounce * 0.06 : breathe;
  ctx.scale(1 / squash, squash);
  const celebrate = poppu.mood === 'celebrate';
  const poppuImg = celebrate ? 'poppu-celebrate' : poppu.mood === 'excited' ? 'poppu-excited' : 'poppu-idle';
  drawImg(poppuImg, 150, -4);
  if (celebrate) {
    for (let k = 0; k < 5; k++) {
      const a = poppu.armWave * 0.5 + k * (TAU / 5);
      const rr = 42 + Math.sin(poppu.armWave + k) * 3;
      ctx.save(); ctx.translate(Math.cos(a) * rr, -18 + Math.sin(a) * rr * 0.7); ctx.rotate(poppu.armWave + k);
      drawStar(0, 0, 3.6, `hsl(${(k * 62) % 360},100%,74%)`); ctx.restore();
    }
  }
  ctx.restore();
}

/* ---- backgrounds ---- */
function drawLevelBG(dt) {
  const L = LEVELS[currentLevel], grade = L.grade;
  if (grade === 'ocean') {
    drawOceanBG(dt);
  } else if (!drawBGCover(L.bg)) {
    const g = ctx.createLinearGradient(0, 0, 0, H);
    g.addColorStop(0, L.night ? '#26264a' : '#bfe6f5'); g.addColorStop(1, L.night ? '#3d3a6b' : '#e6f7ff');
    ctx.fillStyle = g; ctx.fillRect(0, 0, W, H);
  }
  // mood grading — makes each reused painting read as its own theme
  if (grade === 'garden') gradeGarden();
  else if (grade === 'beach') gradeBeach(dt);
  else if (grade === 'night') gradeNight(dt);
  // meadow & garden keep the illustrated wildflower foreground band
  if (currentLevel === 0 || grade === 'garden') {
    const im = IMG['flower-set'];
    if (im && im.complete && im.naturalWidth) {
      const bh = clamp(H * 0.16, 80, 190), bw = bh * (im.naturalWidth / im.naturalHeight);
      for (let x = -bw * 0.3; x < W + bw; x += bw * 0.92) ctx.drawImage(im, x, H - bh, bw, bh);
    }
  }
  // sky reveals a soft rainbow as clouds are pushed away
  if (currentLevel === 2 && rainbowReveal > 0.01) {
    ctx.save(); ctx.globalAlpha = clamp(rainbowReveal, 0, 1) * 0.9;
    const cx = W * 0.5, cy = H * 0.9, bands = ['#ff6b8f','#ffb26b','#ffe66b','#8fe08f','#6bc6ff','#c39bff'];
    for (let i = 0; i < bands.length; i++) { ctx.strokeStyle = bands[i]; ctx.lineWidth = 16; ctx.beginPath(); ctx.arc(cx, cy, Math.min(W,H) * 0.5 - i * 16, Math.PI, TAU); ctx.stroke(); }
    ctx.restore();
  }
}

/* ---- mood grades (drawn over a reused painted background) ---- */
function gradeGarden() {
  // warm, blossom-tinted afternoon so the meadow reads as a flower garden
  ctx.save();
  ctx.globalCompositeOperation = 'soft-light'; ctx.globalAlpha = 0.5;
  const g = ctx.createLinearGradient(0, 0, 0, H);
  g.addColorStop(0, '#ffd0e6'); g.addColorStop(0.6, '#fff0c8'); g.addColorStop(1, '#ffe6b0');
  ctx.fillStyle = g; ctx.fillRect(0, 0, W, H);
  ctx.globalCompositeOperation = 'source-over'; ctx.globalAlpha = 0.5;
  const bloom = ctx.createRadialGradient(W * 0.8, H * 0.16, 10, W * 0.8, H * 0.16, Math.max(W, H) * 0.55);
  bloom.addColorStop(0, 'rgba(255,240,200,0.7)'); bloom.addColorStop(1, 'rgba(255,240,200,0)');
  ctx.fillStyle = bloom; ctx.fillRect(0, 0, W, H);
  ctx.restore();
}
function gradeBeach(dt) {
  // reuse the painted sky, then lay in real sea + sand bands and a warm sun
  const sea = H * 0.56, sand = H * 0.80;
  ctx.save();
  // sun glow, upper-right
  const sg = ctx.createRadialGradient(W * 0.82, H * 0.2, 8, W * 0.82, H * 0.2, Math.max(W, H) * 0.5);
  sg.addColorStop(0, 'rgba(255,246,210,0.85)'); sg.addColorStop(1, 'rgba(255,246,210,0)');
  ctx.fillStyle = sg; ctx.fillRect(0, 0, W, H);
  // sea
  const water = ctx.createLinearGradient(0, sea, 0, sand);
  water.addColorStop(0, '#8fe0ea'); water.addColorStop(1, '#39b6d8');
  ctx.fillStyle = water; ctx.fillRect(0, sea, W, sand - sea);
  // foam line where waves meet sand
  ctx.globalAlpha = 0.6; ctx.strokeStyle = '#ffffff'; ctx.lineWidth = clamp(H * 0.012, 5, 10); ctx.lineCap = 'round';
  ctx.beginPath();
  for (let x = 0; x <= W; x += 26) { const y = sand + Math.sin(x * 0.02 + poppu.t * 1.5) * 5; x === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y); }
  ctx.stroke(); ctx.globalAlpha = 1;
  // sand
  const s = ctx.createLinearGradient(0, sand, 0, H);
  s.addColorStop(0, '#ffe9bf'); s.addColorStop(1, '#f4cf94');
  ctx.fillStyle = s; ctx.fillRect(0, sand - 2, W, H - sand + 2);
  ctx.restore();
}
function gradeNight(dt) {
  // moonlit forest: darken the meadow painting and cool it down
  ctx.save();
  ctx.globalCompositeOperation = 'multiply';
  const g = ctx.createLinearGradient(0, 0, 0, H);
  g.addColorStop(0, '#2a3566'); g.addColorStop(0.55, '#38407a'); g.addColorStop(1, '#20264f');
  ctx.fillStyle = g; ctx.fillRect(0, 0, W, H);
  ctx.globalCompositeOperation = 'source-over';
  // moon + halo, upper-left
  const mx = W * 0.2, my = H * 0.2, mr = clamp(Math.min(W, H) * 0.06, 26, 48);
  const halo = ctx.createRadialGradient(mx, my, mr * 0.5, mx, my, mr * 4);
  halo.addColorStop(0, 'rgba(224,236,255,0.5)'); halo.addColorStop(1, 'rgba(224,236,255,0)');
  ctx.fillStyle = halo; ctx.beginPath(); ctx.arc(mx, my, mr * 4, 0, TAU); ctx.fill();
  ctx.fillStyle = '#f3f7ff'; ctx.beginPath(); ctx.arc(mx, my, mr, 0, TAU); ctx.fill();
  ctx.globalAlpha = 0.12; ctx.fillStyle = '#c8d4ff'; ctx.beginPath(); ctx.arc(mx + mr * 0.35, my - mr * 0.2, mr * 0.85, 0, TAU); ctx.fill();
  ctx.globalAlpha = 1; ctx.restore();
}
/* ---- procedural underwater scene (no bg-ocean asset) ---- */
function drawOceanBG(dt) {
  const g = ctx.createLinearGradient(0, 0, 0, H);
  g.addColorStop(0, '#59c9e0'); g.addColorStop(0.4, '#2b9fca'); g.addColorStop(0.8, '#0f6aa0'); g.addColorStop(1, '#0a4d7d');
  ctx.fillStyle = g; ctx.fillRect(0, 0, W, H);
  // god rays sweeping down from the surface
  ctx.save(); ctx.globalCompositeOperation = 'screen';
  const rays = 5;
  for (let i = 0; i < rays; i++) {
    const bx = (i + 0.5) / rays * W + Math.sin(poppu.t * 0.3 + i) * W * 0.05;
    const topW = clamp(W * 0.06, 40, 120), botW = topW * 3;
    ctx.globalAlpha = 0.10 + 0.05 * Math.sin(poppu.t * 0.6 + i * 1.7);
    const rg = ctx.createLinearGradient(bx, 0, bx, H);
    rg.addColorStop(0, 'rgba(220,250,255,0.9)'); rg.addColorStop(1, 'rgba(220,250,255,0)');
    ctx.fillStyle = rg;
    ctx.beginPath();
    ctx.moveTo(bx - topW / 2, 0); ctx.lineTo(bx + topW / 2, 0);
    ctx.lineTo(bx + botW / 2 + 40, H); ctx.lineTo(bx - botW / 2 + 40, H);
    ctx.closePath(); ctx.fill();
  }
  ctx.restore();
  // soft seabed
  ctx.save();
  const bedH = clamp(H * 0.14, 70, 150);
  const bed = ctx.createLinearGradient(0, H - bedH, 0, H);
  bed.addColorStop(0, 'rgba(20,70,105,0)'); bed.addColorStop(1, '#0a3d63');
  ctx.fillStyle = bed; ctx.fillRect(0, H - bedH, W, bedH);
  ctx.fillStyle = '#12507e';
  ctx.beginPath(); ctx.moveTo(0, H);
  for (let x = 0; x <= W; x += 40) ctx.lineTo(x, H - 18 - Math.sin(x * 0.01) * 16);
  ctx.lineTo(W, H); ctx.closePath(); ctx.fill();
  ctx.restore();
}

/* ============================================================================
   WIND APPLICATION
   ========================================================================== */
function applyWindToObjects(dt) {
  if (trail.length === 0) return;
  const windMul = LEVELS[currentLevel].windMul || 1;
  const start = Math.max(0, trail.length - 14);
  for (const o of objects) {
    if (o.gone) continue;
    for (let i = start; i < trail.length; i++) {
      const t = trail[i];
      const radius = 120 + t.r * 120;
      const d2 = dist2(t.x, t.y, o.x, o.y);
      if (d2 < radius * radius) {
        const d = Math.sqrt(d2) || 1;
        const falloff = (1 - d / radius);
        const power = falloff * t.r * t.life * 1.4 * windMul;
        const nx = (o.x - t.x) / d, ny = (o.y - t.y) / d;
        const fx = t.vx * 0.35 + nx * 120;
        const fy = t.vy * 0.35 + ny * 120;
        o.applyWind(fx, fy, power * dt * 3);
      }
    }
  }
}

function onObjectCleared(o) {
  const cx = clamp(o.x, 0, W), cy = clamp(o.y, 0, H);
  if (o.isStar) { collectStar(cx, cy); o.alive = false; return; }
  const col = o.color || '#fff';
  burst(cx, cy, typeof col === 'string' && col[0] === '#' ? col : '#fff', 10, { min: 40, max: 180, twinkle: true, rMin: 3, rMax: 7, grav: 30 });
  poppuReact(0.6);
  if (o.counts) { clearedCount++; Audio.sfx.giggle(); checkSceneClear(); }
  o.alive = false;
}
function collectStar(x, y) {
  starsThisLevel = Math.min(3, starsThisLevel + 1);
  burst(x, y, '#ffe08a', 18, { min: 60, max: 240, twinkle: true, rMin: 3, rMax: 7, grav: 15 });
  Audio.sfx.star(); poppuReact(0.9);
  showHint('⭐ Star found!');
}
function checkSceneClear() {
  if (sceneState !== 'playing') return;

}
function startCelebration() {
  sceneState = 'celebrating'; celebrateT = 0; nextFirework = 0.15;

}

function updateCelebration(dt) {

function hit(rect, p) {
  if (!rect) return false;
  if (rect.r != null) return dist2(rect.x, rect.y, p.x, p.y) <= rect.r * rect.r;
  return p.x >= rect.x && p.x <= rect.x + rect.w && p.y >= rect.y && p.y <= rect.y + rect.h;
}

function drawSoftClouds(dt) {
  for (const c of bgClouds) {
    c.x += c.sp * dt; if (c.x > W + 90) c.x = -90;
    ctx.save(); ctx.translate(c.x, c.y * 0.9); ctx.scale(c.s, c.s);
    ctx.globalAlpha = 0.85; ctx.fillStyle = '#ffffff';
    for (const [px, py, r] of [[-26,4,18],[-6,-6,24],[16,-2,20],[30,6,15],[2,10,22]]) { ctx.beginPath(); ctx.arc(px, py, r, 0, TAU); ctx.fill(); }
    ctx.restore(); ctx.globalAlpha = 1;
  }
}

// Brand title: 3 Poppu-World colours only (no rainbow), white fill + coloured outline.
function drawBrandTitle(cx, cy) {
  const word = 'Poppu Blow';
  const fs = clamp(Math.min(W, H) * 0.13, 40, 92);
  ctx.save();
  ctx.font = `900 ${fs}px "Trebuchet MS", "Segoe UI", sans-serif`;
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  const letters = word.split('');
  const widths = letters.map(ch => ctx.measureText(ch).width);
  const spacing = fs * 0.02;
  const total = widths.reduce((a, b) => a + b, 0) + spacing * (letters.length - 1);
  let x = cx - total / 2;
  const brand = ['#ff8fb8', '#7ec8f0', '#ffd166']; // pink · sky · sunny — Poppu World
  for (let i = 0; i < letters.length; i++) {
    const ch = letters[i], w = widths[i];
    if (ch === ' ') { x += w + spacing; continue; }
    const lx = x + w / 2, ly = cy + Math.sin(screenT * 2 + i * 0.5) * 4;
    const col = brand[i % brand.length];
    ctx.save(); ctx.translate(lx, ly); ctx.rotate(Math.sin(i * 1.3) * 0.05);
    ctx.lineJoin = 'round'; ctx.lineWidth = fs * 0.16; ctx.strokeStyle = col; ctx.strokeText(ch, 0, 0);
    softShadow('rgba(120,90,150,0.28)', 6, 0, 3); ctx.fillStyle = '#ffffff'; ctx.fillText(ch, 0, 0); clearShadow();
    ctx.restore();
    x += w + spacing;
  }
  ctx.restore();
}

  softShadow('rgba(150,120,170,0.25)', 10, 0, 4); ctx.fillStyle = 'rgba(255,255,255,0.94)';
  roundRect(ctx, cx - bw / 2, cy - bh / 2, bw, bh, bh / 2); ctx.fill(); clearShadow();
  ctx.beginPath(); ctx.moveTo(cx - 7, cy + bh / 2 - 2); ctx.lineTo(cx + 7, cy + bh / 2 - 2); ctx.lineTo(cx, cy + bh / 2 + 9); ctx.fill();
  ctx.fillStyle = '#a06fb0'; ctx.fillText(text, cx, cy);

}
function drawPillButton(cx, cy, label, c1, c2) {
  const r = clamp(Math.min(W, H) * 0.09, 46, 82);
  const bw = r * 3.4, bh = r * 1.4;
  ctx.save();
  ctx.fillStyle = 'rgba(55,120,45,0.30)'; roundRect(ctx, cx - bw/2, cy - bh/2 + 9, bw, bh, bh/2); ctx.fill();
  const g = ctx.createLinearGradient(0, cy - bh/2, 0, cy + bh/2); g.addColorStop(0, c1); g.addColorStop(1, c2);
  softShadow('rgba(80,180,60,0.5)', 18, 0, 6); ctx.fillStyle = g; roundRect(ctx, cx - bw/2, cy - bh/2, bw, bh, bh/2); ctx.fill(); clearShadow();
  ctx.globalAlpha = 0.35; ctx.fillStyle = '#ffffff'; roundRect(ctx, cx - bw/2 + r*0.2, cy - bh/2 + r*0.15, bw - r*0.4, r*0.5, r*0.25); ctx.fill(); ctx.globalAlpha = 1;
  ctx.font = `900 ${r * 0.6}px "Trebuchet MS", sans-serif`; ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
  const tw = ctx.measureText(label).width, ts = r * 0.4, gap = r * 0.28;
  let gx = cx - (ts + gap + tw) / 2;
  ctx.fillStyle = '#ffffff';
  ctx.beginPath(); ctx.moveTo(gx, cy - ts); ctx.lineTo(gx + ts, cy); ctx.lineTo(gx, cy + ts); ctx.closePath(); ctx.fill();
  ctx.fillText(label, gx + ts + gap, cy + 1);
  ctx.restore();
  return { x: cx - bw/2, y: cy - bh/2, w: bw, h: bh };
}

/* ---- LEVEL SELECT MAP ---- */
function drawMap(dt) {
  screenT += dt;
  // dreamy sky + hills backdrop
  const g = ctx.createLinearGradient(0, 0, 0, H);
  g.addColorStop(0, '#a9e4ff'); g.addColorStop(0.55, '#cdeffb'); g.addColorStop(1, '#e9f9e6');
  ctx.fillStyle = g; ctx.fillRect(0, 0, W, H);
  drawSoftClouds(dt);
  ctx.fillStyle = '#bfe89a'; ctx.beginPath(); ctx.moveTo(0, H); ctx.lineTo(0, H * 0.72);
  for (let x = 0; x <= W; x += 24) ctx.lineTo(x, H * 0.72 + Math.sin(x * 0.006 + 1) * 26);
  ctx.lineTo(W, H); ctx.closePath(); ctx.fill();

  // compute node layout (zig-zag path bottom -> top)
  const n = LEVELS.length;
  const r = clamp(Math.min(W, H) * 0.062, 30, 48);
  const topPad = H * 0.20, botPad = H * 0.80;
  const nodes = [];
  for (let i = 0; i < n; i++) {
    const t = i / (n - 1);
    const y = botPad - t * (botPad - topPad);
    const x = W * 0.5 + Math.sin(i * 1.15) * (W * 0.30);
    nodes.push({ x, y, i, level: i + 1, unlocked: Progress.isUnlocked(i + 1), completed: Progress.isCompleted(i + 1), stars: Progress.starsFor(i + 1) });
  }
  // dotted connecting path
  ctx.save(); ctx.strokeStyle = 'rgba(255,255,255,0.85)'; ctx.lineWidth = clamp(r * 0.32, 8, 16); ctx.lineCap = 'round'; ctx.setLineDash([2, r * 0.7]);
  ctx.beginPath(); ctx.moveTo(nodes[0].x, nodes[0].y);
  for (let i = 1; i < n; i++) { const a = nodes[i-1], b = nodes[i], mx = (a.x + b.x) / 2; ctx.quadraticCurveTo(mx, a.y, b.x, b.y); }
  ctx.stroke(); ctx.restore();

  // find current level (first unlocked & not completed)
  let currentIdx = -1;
  for (let i = 0; i < n; i++) if (nodes[i].unlocked && !nodes[i].completed) { currentIdx = i; break; }

  for (const nd of nodes) {
    const isCurrent = nd.i === currentIdx;
    // glow ring on current
    if (isCurrent) {
      const pr = r * (1.28 + Math.sin(screenT * 3) * 0.08);
      ctx.save(); ctx.globalAlpha = 0.5; const gg = ctx.createRadialGradient(nd.x, nd.y, r * 0.6, nd.x, nd.y, pr);
      gg.addColorStop(0, 'rgba(255,240,150,0.9)'); gg.addColorStop(1, 'rgba(255,240,150,0)');
      ctx.fillStyle = gg; ctx.beginPath(); ctx.arc(nd.x, nd.y, pr, 0, TAU); ctx.fill(); ctx.restore();
    }
    // base
    ctx.save();
    softShadow('rgba(60,70,90,0.28)', 10, 0, 5);
    ctx.beginPath(); ctx.arc(nd.x, nd.y, r, 0, TAU);
    if (!nd.unlocked) { ctx.fillStyle = '#b9c2cf'; }
    else {
      const c = THEME_COLORS[nd.i]; const rg = ctx.createRadialGradient(nd.x - r*0.3, nd.y - r*0.3, r*0.2, nd.x, nd.y, r);
      rg.addColorStop(0, mixHex(c, '#ffffff', 0.45)); rg.addColorStop(1, c); ctx.fillStyle = rg;
    }
    ctx.fill(); clearShadow();
    ctx.lineWidth = r * 0.12; ctx.strokeStyle = 'rgba(255,255,255,0.9)'; ctx.stroke();
    ctx.restore();
    // content
    if (!nd.unlocked) {
      // lock icon
      ctx.save(); ctx.fillStyle = 'rgba(255,255,255,0.92)';
      roundRect(ctx, nd.x - r*0.28, nd.y - r*0.05, r*0.56, r*0.45, r*0.1); ctx.fill();
      ctx.strokeStyle = 'rgba(255,255,255,0.92)'; ctx.lineWidth = r*0.11; ctx.beginPath(); ctx.arc(nd.x, nd.y - r*0.05, r*0.2, Math.PI, TAU); ctx.stroke();
      ctx.restore();
    } else {
      ctx.save();
      ctx.font = `900 ${r * 0.8}px "Trebuchet MS", sans-serif`; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillStyle = 'rgba(255,255,255,0.95)'; softShadow('rgba(0,0,0,0.18)', 4, 0, 2); ctx.fillText(String(nd.level), nd.x, nd.y + r*0.02); clearShadow();
      ctx.restore();
      // stars earned (mini) above node
      if (nd.completed) {
        for (let s = 0; s < 3; s++) {
          ctx.save(); ctx.translate(nd.x + (s - 1) * r * 0.5, nd.y - r * 1.18);
          drawStar(0, 0, r * 0.22, s < nd.stars ? '#ffd54a' : 'rgba(255,255,255,0.55)'); ctx.restore();
        }
      }
    }
  }
  ui.mapNodes = nodes;

  // Poppu guide (bottom-left) pointing to the map
  const gs = clamp(Math.min(W, H) * 0.2, 90, 170);
  ctx.save(); ctx.translate(gs * 0.72, H - gs * 0.6 + Math.sin(screenT * 2) * 4);
  if (!drawImg('poppu-guide', gs)) drawImg('poppu-idle', gs);
  ctx.restore();

  // top bar: title + star progress + sticker book button
  drawTopBar();
}

function drawTopBar() {
  const pad = clamp(Math.min(W, H) * 0.03, 10, 22);
  const h = clamp(Math.min(W, H) * 0.062, 34, 52);
  // star progress pill (top-left)
  ctx.save();
  ctx.font = `bold ${h * 0.5}px "Trebuchet MS", sans-serif`; ctx.textBaseline = 'middle';
  const txt = Progress.totalStars() + '/24';
  const tw = ctx.measureText(txt).width;
  const pw = tw + h * 1.5;
  softShadow('rgba(60,70,90,0.2)', 8, 0, 3); ctx.fillStyle = 'rgba(255,255,255,0.92)'; roundRect(ctx, pad, pad, pw, h, h/2); ctx.fill(); clearShadow();
  ctx.save(); ctx.translate(pad + h * 0.5, pad + h/2); drawStar(0, 0, h * 0.26, '#ffd54a'); ctx.restore();
  ctx.fillStyle = '#7a6a55'; ctx.textAlign = 'left'; ctx.fillText(txt, pad + h * 0.9, pad + h/2 + 1);
  ctx.restore();
  // sticker book button (top-right)
  const bx = W - pad - h, by = pad;
  ctx.save(); softShadow('rgba(60,70,90,0.2)', 8, 0, 3); ctx.fillStyle = 'rgba(255,255,255,0.92)';
  roundRect(ctx, bx, by, h, h, h * 0.28); ctx.fill(); clearShadow();
  ctx.translate(bx + h/2, by + h/2);
  if (!drawImg('sticker-book-icon', h * 0.72)) { ctx.font = `${h*0.6}px serif`; ctx.textAlign = 'center'; ctx.textBaseline = 'middle'; ctx.fillText('📖', 0, 2); }
  ctx.restore();
  ui.bookIcon = { x: bx, y: by, w: h, h: h };
}

/* ---- STICKER BOOK OVERLAY ---- */
function drawBook() {
  ctx.save();
  ctx.fillStyle = 'rgba(40,30,60,0.55)'; ctx.fillRect(0, 0, W, H);
  const pw = Math.min(W * 0.9, 560), ph = Math.min(H * 0.82, 640);
  const px = (W - pw) / 2, py = (H - ph) / 2;
  softShadow('rgba(0,0,0,0.3)', 30, 0, 12);
  const pg = ctx.createLinearGradient(0, py, 0, py + ph); pg.addColorStop(0, '#fff7ef'); pg.addColorStop(1, '#ffe9db');
  ctx.fillStyle = pg; roundRect(ctx, px, py, pw, ph, 28); ctx.fill(); clearShadow();
  ctx.lineWidth = 6; ctx.strokeStyle = '#ffd9b8'; roundRect(ctx, px + 6, py + 6, pw - 12, ph - 12, 22); ctx.stroke();
  // title
  ctx.fillStyle = '#c07a4a'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.font = `900 ${clamp(pw * 0.075, 24, 40)}px "Trebuchet MS", sans-serif`;
  ctx.fillText('My Stickers', W / 2, py + ph * 0.1);
  // 2x4 grid
  const cols = 2, rows = 4;
  const gx = px + pw * 0.1, gy = py + ph * 0.18, gw = pw * 0.8, gh = ph * 0.74;
  const cw = gw / cols, ch = gh / rows;
  const cell = Math.min(cw, ch) * 0.82;
  for (let i = 0; i < 8; i++) {
    const c = i % cols, rr = (i / cols) | 0;
    const ccx = gx + cw * c + cw / 2, ccy = gy + ch * rr + ch / 2;
    const unlocked = Progress.hasSticker(i + 1);
    ctx.save();
    // slot
    ctx.fillStyle = unlocked ? 'rgba(255,255,255,0.9)' : 'rgba(210,196,180,0.5)';
    softShadow('rgba(120,90,60,0.18)', 8, 0, 3);
    ctx.beginPath(); ctx.arc(ccx, ccy, cell / 2, 0, TAU); ctx.fill(); clearShadow();
    if (unlocked) {
      ctx.save(); ctx.translate(ccx, ccy);
      if (!drawImg('sticker-' + (i + 1), cell * 0.92)) { drawStar(0, 0, cell * 0.3, THEME_COLORS[i]); }
      ctx.restore();
    } else {
      ctx.fillStyle = 'rgba(150,130,110,0.7)'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.font = `900 ${cell * 0.4}px "Trebuchet MS", sans-serif`; ctx.fillText('?', ccx, ccy + 2);
    }
    ctx.restore();
  }
  // close hint
  ctx.fillStyle = 'rgba(160,120,90,0.8)'; ctx.textAlign = 'center'; ctx.font = `bold ${clamp(pw*0.04,13,18)}px "Trebuchet MS", sans-serif`;
  ctx.fillText('tap anywhere to close', W / 2, py + ph - 22);
  ctx.restore();
}

/* ---- PLAY HUD ---- */
function drawHUD() {
  const pad = clamp(Math.min(W, H) * 0.03, 10, 20);
  const h = clamp(Math.min(W, H) * 0.06, 32, 48);
  // home button (top-left)
  ctx.save(); softShadow('rgba(60,70,90,0.22)', 8, 0, 3); ctx.fillStyle = 'rgba(255,255,255,0.9)';
  roundRect(ctx, pad, pad, h, h, h * 0.28); ctx.fill(); clearShadow();
  ctx.strokeStyle = '#7a6a8a'; ctx.lineWidth = h * 0.09; ctx.lineJoin = 'round'; ctx.lineCap = 'round';
  const mx = pad + h/2, my = pad + h/2;
  ctx.beginPath(); ctx.moveTo(mx - h*0.2, my + h*0.02); ctx.lineTo(mx, my - h*0.2); ctx.lineTo(mx + h*0.2, my + h*0.02); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(mx - h*0.13, my - h*0.02); ctx.lineTo(mx - h*0.13, my + h*0.18); ctx.lineTo(mx + h*0.13, my + h*0.18); ctx.lineTo(mx + h*0.13, my - h*0.02); ctx.stroke();
  ctx.restore();
  ui.homeBtn = { x: pad, y: pad, w: h, h: h };

  // level name pill + progress dots (top-center)
  ctx.save();
  ctx.font = `bold ${h*0.42}px "Trebuchet MS", sans-serif`; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  const label = LEVELS[currentLevel].name;
  const lw = ctx.measureText(label).width + h * 0.9;
  ctx.fillStyle = 'rgba(0,0,0,0.16)'; roundRect(ctx, W/2 - lw/2, pad, lw, h * 0.62, h*0.31); ctx.fill();
  ctx.fillStyle = '#fff'; ctx.fillText(label, W/2, pad + h*0.31 + 1);
  ctx.restore();
  if (totalTarget > 0) {
    const done = clamp(clearedCount, 0, totalTarget), gap = clamp(W * 0.03, 16, 22), r2 = 6;
    let x = W/2 - (totalTarget * gap)/2 + gap/2; const y = pad + h * 0.85;
    for (let i = 0; i < totalTarget; i++) {
      ctx.beginPath(); ctx.arc(x, y, r2, 0, TAU);
      if (i < done) { ctx.fillStyle = '#ffe08a'; ctx.fill(); ctx.strokeStyle = 'rgba(255,255,255,0.9)'; ctx.lineWidth = 2; ctx.stroke(); }
      else { ctx.fillStyle = 'rgba(255,255,255,0.4)'; ctx.fill(); }
      x += gap;
    }
  }
  // star counter (top-right)
  ctx.save();
  const txt = starsThisLevel + '/3';
  ctx.font = `bold ${h*0.44}px "Trebuchet MS", sans-serif`; ctx.textBaseline = 'middle';
  const tw = ctx.measureText(txt).width, pw = tw + h * 1.4, bx = W - pad - pw;
  softShadow('rgba(60,70,90,0.2)', 8, 0, 3); ctx.fillStyle = 'rgba(255,255,255,0.9)'; roundRect(ctx, bx, pad, pw, h, h/2); ctx.fill(); clearShadow();
  ctx.save(); ctx.translate(bx + h*0.5, pad + h/2); drawStar(0, 0, h * 0.24, '#ffd54a'); ctx.restore();
  ctx.fillStyle = '#7a6a55'; ctx.textAlign = 'left'; ctx.fillText(txt, bx + h*0.85, pad + h/2 + 1);
  ctx.restore();
}

/* ---- onboarding tutorial (level 1 first play) ---- */
function drawTutorial(dt) {
  if (!tutorial) return;
  tutorial.t += dt;
  const d = tutorial.dandelion;
  const cy = H * 0.5, cx = W * 0.5;
  const ax = cx + Math.sin(tutorial.t * 1.6) * W * 0.13;   // hand sweeps left-right
  // caption
  ctx.save();
  ctx.font = `900 ${clamp(Math.min(W,H)*0.05,20,34)}px "Trebuchet MS", sans-serif`; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  softShadow('rgba(120,90,150,0.3)', 8, 0, 3); ctx.lineWidth = 6; ctx.strokeStyle = '#7ec8f0'; ctx.strokeText('Drag to blow!', cx, H * 0.34);
  ctx.fillStyle = '#fff'; ctx.fillText('Drag to blow!', cx, H * 0.34); clearShadow();
  // arrow trail
  ctx.globalAlpha = 0.5; ctx.strokeStyle = '#ffffff'; ctx.lineWidth = 10; ctx.lineCap = 'round';
  ctx.beginPath(); ctx.moveTo(cx - W*0.13, cy); ctx.lineTo(cx + W*0.13, cy); ctx.stroke();
  ctx.globalAlpha = 1;
  // hand
  ctx.translate(ax, cy);
  ctx.font = `${clamp(Math.min(W,H)*0.09,40,70)}px serif`; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText('👆', 0, 6);
  ctx.restore();
  // demo: gently nudge nearest dandelion so a few seeds drift
  if (d && !d.gone && tutorial.t > 0.5 && Math.random() < 0.06) kindConfig.dandelion.onWind(d, 0.5);
}

/* ---- level-complete reward popup ---- */
function drawReward(dt) {
  rewardT += dt;
  ctx.save();
  ctx.fillStyle = 'rgba(40,30,60,0.5)'; ctx.fillRect(0, 0, W, H);
  const pop = clamp(easeOutBack(clamp(rewardT / 0.5, 0, 1)), 0, 1.2);
  const cx = W / 2, cy = H * 0.44;
  const pw = Math.min(W * 0.8, 420), ph = pw * 1.05;
  ctx.save(); ctx.translate(cx, cy); ctx.scale(pop, pop); ctx.translate(-cx, -cy);
  const pg = ctx.createLinearGradient(0, cy - ph/2, 0, cy + ph/2); pg.addColorStop(0, '#fff7ef'); pg.addColorStop(1, '#ffe9db');
  softShadow('rgba(0,0,0,0.3)', 26, 0, 10); ctx.fillStyle = pg; roundRect(ctx, cx - pw/2, cy - ph/2, pw, ph, 26); ctx.fill(); clearShadow();
  // title
  ctx.fillStyle = '#e08a3a'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.font = `900 ${clamp(pw*0.1,26,40)}px "Trebuchet MS", sans-serif`; ctx.fillText('New Sticker!', cx, cy - ph * 0.36);
  // sticker
  ctx.save(); ctx.translate(cx, cy - ph * 0.02);
  const wob = 1 + Math.sin(rewardT * 4) * 0.03; ctx.scale(wob, wob);
  if (!drawImg('sticker-' + newStickerId, pw * 0.6)) drawStar(0, 0, pw * 0.2, THEME_COLORS[(newStickerId-1) % THEME_COLORS.length]);
  ctx.restore();
  // stars earned
  for (let s = 0; s < 3; s++) {
    ctx.save(); ctx.translate(cx + (s - 1) * pw * 0.2, cy + ph * 0.32);
    const on = s < starsThisLevel;
    if (on) { const t = clamp((rewardT - 0.4 - s * 0.18) / 0.3, 0, 1); ctx.scale(easeOutBack(t), easeOutBack(t)); }
    drawStar(0, 0, pw * 0.09, on ? '#ffd54a' : 'rgba(180,170,150,0.5)'); ctx.restore();
  }
  ctx.restore();
  // tap to continue
  if (rewardT > 1.0) {
    ctx.globalAlpha = 0.6 + Math.sin(rewardT * 3) * 0.3;
    ctx.fillStyle = '#fff'; ctx.textAlign = 'center'; ctx.font = `bold ${clamp(Math.min(W,H)*0.035,15,20)}px "Trebuchet MS", sans-serif`;
    ctx.fillText('tap to continue ▶', W / 2, H * 0.82); ctx.globalAlpha = 1;
  }
  ctx.restore();
}

/* ============================================================================
   INPUT ROUTING
   ========================================================================== */
function screenPos(e) { const t = e.touches ? e.touches[0] : e; return { x: t.clientX, y: t.clientY }; }

function onDown(e) {
  if (e && e.preventDefault) e.preventDefault();
  Audio.unlock();
  const p = screenPos(e);
  if (bookOpen) { bookOpen = false; return; }
  if (gameScreen === 'title') { gameScreen = 'map'; Audio.startMusic(); return; }
  if (gameScreen === 'map') {
    if (hit(ui.bookIcon, p)) { bookOpen = true; Audio.sfx.pop(); return; }
    for (const nd of ui.mapNodes) {
      if (nd.unlocked && dist2(nd.x, nd.y, p.x, p.y) <= (clamp(Math.min(W,H)*0.062,30,48) * 1.25) ** 2) { startLevel(nd.i); return; }
    }
    return;
  }
  // play
  if (sceneState === 'reward') { gameScreen = 'map'; return; }
  if (hit(ui.homeBtn, p)) { gameScreen = 'map'; Audio.setWind(0); return; }
  if (tutorial) { tutorial = null; Progress.markTutorial(); }
  pointer.down = true; pointer.active = true;
  pointer.x = pointer.px = p.x; pointer.y = pointer.py = p.y;
  pointer.vx = pointer.vy = 0; pointer.speed = 0; pointer.lastT = performance.now();
  hideHint();
}
function onMove(e) { if (!pointer.down) return; const p = screenPos(e); pointer.x = p.x; pointer.y = p.y; if (e && e.preventDefault) e.preventDefault(); }
function onUp(e) { pointer.down = false; if (e && e.preventDefault) e.preventDefault(); }

canvas.addEventListener('mousedown', onDown);
window.addEventListener('mousemove', onMove);
window.addEventListener('mouseup', onUp);
canvas.addEventListener('touchstart', onDown, { passive: false });
canvas.addEventListener('touchmove', onMove, { passive: false });
window.addEventListener('touchend', onUp, { passive: false });
window.addEventListener('touchcancel', onUp, { passive: false });
document.addEventListener('visibilitychange', () => { if (!document.hidden) Audio.resume(); });

function startLevel(i) {
  loadLevel(i);
  gameScreen = 'play';
  pointer.down = false;
  Audio.startMusic();
  idleTimer = 0;
  setTimeout(() => { if (gameScreen === 'play' && !tutorial) showHint('✋ Drag to make wind!'); }, 700);
}

/* ============================================================================
   MAIN LOOP
   ========================================================================== */
let last = performance.now();
let idleTimer = 0;

function frame(now) {
  let dt = (now - last) / 1000; last = now; dt = Math.min(dt, 0.05);
  ctx.clearRect(0, 0, W, H);

  if (gameScreen === 'title') { drawTitle(dt); }
  else if (gameScreen === 'map') { drawMap(dt); }
  else { // play
    updatePointer(dt); updatePoppu(dt);
    if (sceneState === 'playing') { applyWindToObjects(dt); idleTimer += dt; if (pointer.down) idleTimer = 0; }
    if (currentLevel === 2) { // sky rainbow reveal
      let cloudMove = 0, clouds = 0;
      for (const o of objects) if (o.kind === 'cloud') { clouds++; cloudMove += o.reveal || 0; }
      if (clouds) rainbowReveal = lerp(rainbowReveal, cloudMove / clouds, 0.05);
    }
    for (const o of objects) if (!o.gone) o.update(dt);
    updateParticles(dt);
    if (sceneState === 'celebrating') updateCelebration(dt);

    drawLevelBG(dt);
    const sorted = objects.filter(o => !o.gone).sort((a, b) => a.mass - b.mass);
    for (const o of sorted) o.draw();
    drawWindTrail(); drawParticles(); drawParticlesExt();
    drawPoppu();
    if (tutorial) drawTutorial(dt);
    drawHUD();
    if (sceneState === 'reward') drawReward(dt);
    if (sceneState === 'playing' && idleTimer > 4 && !pointer.down && !tutorial) showHint('✋ Drag to make wind!');
  }

  if (bookOpen) drawBook();
  requestAnimationFrame(frame);
}

function drawWindTrail() {
  if (trail.length < 2) return;
  ctx.save(); ctx.lineCap = 'round'; ctx.lineJoin = 'round';
  for (let pass = 0; pass < 2; pass++) {
    ctx.beginPath();
    for (let i = 1; i < trail.length; i++) { const a = trail[i - 1], b = trail[i]; ctx.moveTo(a.x, a.y); ctx.lineTo(b.x, b.y); }
    ctx.strokeStyle = pass === 0 ? 'rgba(200,240,255,0.25)' : 'rgba(255,255,255,0.6)';
    ctx.lineWidth = pass === 0 ? 26 : 10; ctx.globalAlpha = 0.6; ctx.stroke();
  }
  for (let i = 1; i < trail.length; i++) {
    const a = trail[i - 1], b = trail[i];
    ctx.globalAlpha = b.life * 0.5; ctx.strokeStyle = 'rgba(255,255,255,0.9)'; ctx.lineWidth = b.r * 8;
    ctx.beginPath(); ctx.moveTo(a.x, a.y); ctx.lineTo(b.x, b.y); ctx.stroke();
  }
  ctx.restore(); ctx.globalAlpha = 1;
}

/* ---- hint UI ---- */
const hintEl = document.getElementById('hint');
let hintTimer = null;
function showHint(text) { hintEl.textContent = text; hintEl.classList.add('show'); clearTimeout(hintTimer); hintTimer = setTimeout(hideHint, 3000); idleTimer = 0; }
function hideHint() { hintEl.classList.remove('show'); }

requestAnimationFrame(frame);

})();
</script>
